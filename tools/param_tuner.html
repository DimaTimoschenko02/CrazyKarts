<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Kart Physics Tuner</title>
<style>
  :root { --bg: #1a1a2e; --card: #16213e; --accent: #0f3460; --hi: #e94560; --text: #eee; --dim: #888; --green: #4ecca3; --blue: #7fb3d3; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 16px; }
  h1 { text-align: center; margin-bottom: 6px; font-size: 1.4em; }
  .status { text-align: center; margin-bottom: 12px; color: var(--dim); font-size: 0.85em; min-height: 1.2em; }
  .status.saved { color: var(--green); }
  .status.error { color: var(--hi); }
  .toolbar { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .autosave-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.85em; color: var(--dim); }
  .autosave-toggle input { accent-color: var(--hi); }
  button { padding: 7px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85em; font-weight: 600; transition: all 0.15s; }
  .btn-save { background: var(--hi); color: white; }
  .btn-save:hover { background: #ff6b81; }
  .btn-reset { background: var(--accent); color: var(--text); }
  .btn-reset:hover { background: #1a4a80; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 1400px; margin: 0 auto; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  .group { background: var(--card); border-radius: 10px; padding: 14px 16px; }
  .group h2 { color: var(--hi); font-size: 0.95em; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 6px; }
  .param { margin-bottom: 12px; }
  .param:last-child { margin-bottom: 0; }
  .param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .param-name { font-weight: 700; font-size: 0.82em; color: var(--green); font-family: monospace; min-width: 0; white-space: nowrap; }
  .param-slider { flex: 1; accent-color: var(--hi); height: 5px; min-width: 60px; }
  .param-num { width: 68px; background: var(--accent); border: 1px solid #444; color: var(--text); padding: 3px 6px; border-radius: 5px; font-size: 0.85em; text-align: center; }
  .param-num:focus { outline: 1px solid var(--hi); border-color: var(--hi); }
  .param-unit { color: var(--dim); font-size: 0.75em; min-width: 30px; }
  .param-info { display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }
  .param-short { color: var(--dim); font-size: 0.78em; line-height: 1.3; }
  .param-formula { color: var(--blue); font-size: 0.75em; font-family: monospace; }
  .param-expand { color: #666; font-size: 0.7em; cursor: pointer; user-select: none; padding: 0 4px; border-radius: 3px; }
  .param-expand:hover { color: var(--blue); background: rgba(255,255,255,0.05); }
  .param-detail { color: #999; font-size: 0.73em; line-height: 1.5; margin-top: 4px; padding: 6px 8px; background: rgba(0,0,0,0.2); border-radius: 5px; border-left: 2px solid #333; display: none; }
  .param-detail.open { display: block; }
  .changed .param-name { color: #ffcc00; }
  .dep-affected .param-name { color: #ff9f43 !important; transition: color 0.3s; }
  .dep-badge { display: inline-block; background: rgba(127,179,211,0.15); color: var(--blue); font-size: 0.68em; padding: 1px 5px; border-radius: 3px; margin-left: 4px; cursor: help; }
  .dep-section { margin-top: 4px; }
  .dep-section .dep-tag { display: inline-block; background: rgba(78,204,163,0.1); color: var(--green); font-size: 0.7em; padding: 1px 5px; border-radius: 3px; margin: 1px 2px; cursor: pointer; }
  .dep-section .dep-tag:hover { background: rgba(78,204,163,0.25); }
</style>
</head>
<body>

<h1>Kart Physics Tuner</h1>
<div class="status" id="status">Loading...</div>
<div class="toolbar">
  <button class="btn-save" onclick="save()">Save Now</button>
  <button class="btn-reset" onclick="loadParams()">Reload</button>
  <div class="autosave-toggle">
    <input type="checkbox" id="autosave" checked>
    <label for="autosave">Auto-save (0.5s hot-reload)</label>
  </div>
</div>
<div class="grid" id="groups"></div>

<script>
const PARAMS = {
  "Скорость": [
    { key: "MAX_SPEED", min: 5, max: 50, step: 0.5, unit: "m/s",
      short: "Условная макс скорость — используется для расчёта дрифта и камеры. НЕ ограничивает реальную скорость",
      detail: "Это просто число-ориентир, а не настоящий потолок. Настоящую максималку задают ACCEL_FORCE и K_DRAG вместе.\n\nЧто от неё зависит: когда включается эффект скорости на камере (FOV), порог минимальной скорости для дрифта.\n\nПосле тюнинга посмотри реальную макс скорость в оверлее сверху слева (speed=...) и впиши сюда примерно то же значение." },
    { key: "ACCEL_FORCE", min: 10, max: 100, step: 2, unit: "m/s²",
      deps: ["K_DRAG", "K_ROLLING"],
      short: "Сила мотора. Насколько резво машина разгоняется и как высоко её можно разогнать",
      detail: "Чем больше — тем быстрее разгон и выше максималка.\n\nОриентиры:\n• Низкое (15-20): машина ощущается тяжёлой, разгон ленивый\n• Среднее (25-35): аркадный стандарт\n• Высокое (50+): моментальный разгон, пропадает ощущение веса\n\nЕсли хочешь чтоб разгон ощущался весомо — лучше оставь умеренное ACCEL_FORCE и настраивай K_DRAG." },
    { key: "K_DRAG", min: 0.01, max: 0.2, step: 0.005, unit: "",
      deps: ["ACCEL_FORCE"],
      short: "Сопротивление воздуха. Главный ограничитель максималки — чем больше, тем ниже потолок скорости",
      detail: "Работает сильнее на высокой скорости (когда машина уже разогналась). На малых скоростях почти не заметно.\n\nЕсли машина слишком быстрая → увеличь.\nЕсли разгон упирается в слишком низкий потолок → уменьши, или одновременно подними ACCEL_FORCE.\n\nОриентиры при ACCEL=25: K_DRAG=0.02 → макс ~35 м/с, 0.05 → ~22 м/с, 0.1 → ~16 м/с (ощущение густого воздуха)." },
    { key: "K_ROLLING", min: 0.1, max: 5, step: 0.1, unit: "",
      short: "Трение качения. Насколько машина замедляется когда ты отпустил газ (по инерции)",
      detail: "Работает всегда — даже когда не жмёшь тормоз. Отвечает за естественное торможение на выкате.\n\nОриентиры:\n• 0.5: машина долго катится по инерции (как на льду)\n• 1.0-1.5: стандарт\n• 2.5: быстро встаёт без газа\n• 4.0: почти сразу тормозит когда отпустил W\n\nВ отличие от тормоза S это плавное 'подтормаживание', а не резкий стоп." },
    { key: "BRAKE_FORCE", min: 5, max: 60, step: 1, unit: "m/s²",
      short: "Сила торможения кнопкой S. Насколько быстро останавливаешься при активном тормозе",
      detail: "Работает только когда жмёшь S и едешь вперёд.\n\nОриентиры:\n• 10-15: мягкий тормоз, остановка с максималки ~2-3 сек\n• 20-30: стандарт, ~1-1.5 сек\n• 40-50: резкий, ~0.5-1 сек\n• 60: машина 'втыкается' как в стену\n\nЕсли тормоза слишком 'ватные' → увеличь. Если хочешь плавнее останавливаться — уменьши." },
    { key: "REVERSE_RATIO", min: 0.2, max: 0.8, step: 0.05, unit: "x",
      deps: ["ACCEL_FORCE"],
      short: "Сила заднего хода относительно переднего. 0.5 = задний ход вдвое слабее",
      detail: "Задний ход не такой быстрый как передний — это стандарт.\n\nОриентиры:\n• 0.3: еле ползёт назад, только для парковки\n• 0.5: удобно манёврить задним, но не гонка\n• 0.7: задний ход почти такой же быстрый как передний" },
  ],
  "Сглаживание ввода": [
    { key: "STEER_SLEW_IN", min: 1, max: 20, step: 0.5, unit: "/s",
      short: "Как быстро руль прокручивается до упора когда жмёшь A/D. Больше = отзывчивее",
      detail: "Клавиатура даёт 'вкл/выкл' мгновенно, а физике нужна плавность. Этот параметр делает нажатие плавным.\n\nОриентиры:\n• 2: полный поворот за 0.5 сек — руль 'тяжёлый'\n• 5: 0.2 сек — отзывчиво\n• 10+: почти мгновенно — как тумблер\n\nВ v3.0: чем медленнее руль, тем плавнее задние колёса срывают сцепление — занос нарастает мягко. Быстрый руль = резкий вход в дрифт." },
    { key: "STEER_SLEW_OUT", min: 1, max: 15, step: 0.5, unit: "/s",
      short: "Как быстро руль возвращается в центр после отпускания A/D. Важно для выхода из дрифта",
      detail: "Скорость возврата руля к центру. В v3.0 это влияет на то как быстро гасится yaw torque и хвост возвращается за машиной.\n\nОриентиры:\n• 1.5: руль медленно возвращается, машина долго 'катится боком' в продолжение дрифта\n• 3.5: стандарт — естественное распрямление\n• 8+: руль мгновенно в центр, машина резко прекращает поворот" },
    { key: "THROTTLE_SLEW", min: 1, max: 20, step: 0.5, unit: "/s",
      short: "Как быстро газ раскручивается до полного при нажатии W. Меньше = мягче педаль",
      detail: "Делает газ плавным — как педаль, а не тумблер.\n\nОриентиры:\n• 2: ощущение педали, плавный набор\n• 5: средне\n• 10+: почти мгновенный газ (как кнопка)\n\nМаленькое значение добавляет реализма ускорению. Большое — аркадная отзывчивость." },
    { key: "STEER_VISUAL_RATE", min: 5, max: 40, step: 1, unit: "/s",
      short: "Как быстро передние колёса визуально доворачиваются. Чисто косметика — на физику не влияет",
      detail: "Это про анимацию самих передних колёс — как быстро они поворачиваются в ту сторону куда ты рулишь. Физика тут не меняется, только как выглядит.\n\nОриентиры:\n• 8: лениво, колёса медленно доворачивают — как будто руль тугой\n• 18: чётко, колёса следуют за рулём без видимой задержки (рекомендую)\n• 30+: будто на пружине, моментально щёлкают в нужную сторону\n\nЕсли картинка ощущается 'деревянной' при повороте — подними. Если колёса 'дёргаются' — опусти." },
  ],
  "Рулёжка": [
    { key: "STEERING_SPEED", min: 0.5, max: 5, step: 0.1, unit: "rad/s",
      short: "Базовая сила руля. Главный регулятор отзывчивости поворотов",
      detail: "Влияет на то как быстро машина разворачивается.\n\nСлишком мало → машина лениво поворачивает, приходится заранее крутить руль.\nСлишком много → машина дёрганая, крутится волчком от лёгкого касания.\n\nСкорость поворота дополнительно меняется от скорости машины (см. STEER_LOW_MULT / STEER_HIGH_MULT) и от дрифта." },
    { key: "STEER_LOW_MULT", min: 0.5, max: 3, step: 0.05, unit: "x",
      deps: ["STEERING_SPEED", "STEER_HIGH_MULT"],
      short: "Насколько острее руль на малой скорости (для манёвров и парковки)",
      detail: "Обычно больше 1.0 — чтоб машина хорошо маневрировала на медленных скоростях.\n\nОриентиры:\n• 1.0: нет разницы с обычной\n• 1.4: заметно острее на парковке\n• 2.0: очень острый, машина резко крутится на месте\n\nЕсли на медленной скорости руль кажется ватным → увеличь." },
    { key: "STEER_HIGH_MULT", min: 0.1, max: 1.5, step: 0.05, unit: "x",
      deps: ["STEERING_SPEED", "STEER_LOW_MULT"],
      short: "Насколько руль 'успокаивается' на максимальной скорости. Меньше = шире повороты на скорости",
      detail: "Обычно меньше 1.0 — чтоб на максималке машина не крутилась волчком от лёгкого касания руля.\n\nОриентиры:\n• 0.5: очень плавные широкие повороты на скорости\n• 0.8: стандарт\n• 1.0: руль одинаково острый на любой скорости" },
    { key: "STEER_SPEED_THRESHOLD", min: 0.5, max: 10, step: 0.5, unit: "m/s",
      deps: ["STATIONARY_STEER_THRESHOLD"],
      short: "С какой скорости руль выходит на полную чувствительность",
      detail: "Ниже этой скорости руль плавно нарастает от минимальной до полной чувствительности. Выше — остаётся полным.\n\nПример: при 3 м/с — на 1.5 м/с руль работает на 50%, на 3+ — на 100%.\n\nМелкое значение = быстрое 'схватывание' руля при разгоне. Большое = руль раскачивается постепенно." },
    { key: "STATIONARY_STEER_THRESHOLD", min: 0.5, max: 5, step: 0.25, unit: "m/s",
      short: "На какой скорости включается хак 'поворот на месте'",
      detail: "Без этого хака машина вообще не крутится стоя (ведь скорость почти ноль). Ниже этой скорости активируется особый режим — см. STATIONARY_STEER_SCALE.\n\nЕсли машина начинает 'дёргаться' при плавном разгоне в повороте — возможно проблема в зоне этого порога." },
    { key: "STATIONARY_STEER_SCALE", min: 0.1, max: 1.0, step: 0.05, unit: "x",
      short: "[deprecated v3.0] заменён на STATIONARY_OMEGA_KICK. Не влияет в v3.0",
      detail: "[deprecated v3.0] В v3.0 поворот на месте управляется параметром STATIONARY_OMEGA_KICK (в группе 'Велосипед v3.0'). Этот параметр оставлен только для отката к v2.4." },
    { key: "WHEEL_RADIUS", min: 0.05, max: 0.5, step: 0.01, unit: "m",
      short: "Радиус колеса — только для визуальной скорости вращения колёс",
      detail: "Чисто косметический параметр: меньше радиус = колёса визуально крутятся быстрее при той же скорости. На физику не влияет никак." },
  ],
  "Велосипед v3.0": [
    { key: "MAX_STEER_ANGLE_DEG", min: 10, max: 55, step: 1, unit: "°",
      short: "Максимальный угол передних колёс. Главная ручка остроты руля",
      detail: "Это угол на который поворачиваются передние колёса при полном руле. В отличие от старого STEERING_SPEED — это физическая величина, машина крутится emergent от движения колёс.\n\nОриентиры:\n• 20°: машина рулится тупо как грузовик, дуги широкие\n• 32° (дефолт): комфортная аркада\n• 45°: руль очень острый, машина почти дёрганая\n• 55°: экстрим, передок 'выкручивает' каждый поворот\n\nЕсли машина не закладывает виражи → увеличь. Если её 'дёргает' от лёгкого касания → уменьши." },
    { key: "FRONT_GRIP", min: 3, max: 40, step: 0.5, unit: "",
      short: "Сила удержания передней оси. Чем выше, тем меньше передок 'плывёт' в поворотах",
      deps: ["REAR_GRIP", "TIRE_SATURATION"],
      detail: "Передок отвечает за то 'куда машина целится'. Чем выше FRONT_GRIP, тем точнее нос идёт куда повернул руль.\n\nОриентиры:\n• 6: передок постоянно сносит, машина нестабильна как на льду\n• 14 (дефолт): передок держит, задок уходит в занос — классический oversteer\n• 25: передок очень жёсткий, машина агрессивно ввинчивается в поворот\n• 35+: машина 'пилит на рельсах'\n\nДля oversteer drift держи FRONT > REAR. Для understeer (грузовик) — FRONT < REAR." },
    { key: "REAR_GRIP", min: 1, max: 30, step: 0.5, unit: "",
      short: "Сила удержания задней оси. ГЛАВНЫЙ параметр длины и выраженности дрифта",
      deps: ["FRONT_GRIP", "TIRE_SATURATION"],
      detail: "Задние колёса отвечают за хвост машины. Чем меньше REAR_GRIP, тем охотнее хвост уходит в занос и тем дольше скользит.\n\nОриентиры:\n• 3: длинный плавный занос, машина едет боком как на льду\n• 7 (дефолт): занос ощутимый но управляемый, хвост возвращается\n• 12: занос короткий, требуется агрессивный руль чтобы сорвать\n• 20+: хвост держит как клей, дрифта почти нет\n\nДля SmashKarts-feel: REAR ≈ 0.4-0.6 от FRONT. Если занос не ощущается → уменьши REAR. Если хвост вылетает слишком легко → увеличь." },
    { key: "TIRE_SATURATION", min: 0.5, max: 15, step: 0.25, unit: "m/s",
      short: "При какой боковой скорости шины 'перегружаются' и начинают полностью скользить",
      deps: ["FRONT_GRIP", "REAR_GRIP"],
      detail: "Все шины имеют предел: при малом скольжении сила сцепления нарастает линейно, выше этого порога — выходит на 'плато' (срыв в занос). Этот параметр определяет где этот порог.\n\nОриентиры:\n• 1.5: шины срываются мгновенно даже от лёгкого касания, везде дым\n• 4.5 (дефолт): нужно реально ввернуть руль чтобы шина 'отпустила' — драматичный срыв\n• 8: шины очень цепкие, занос только в экстремуме\n• 14: машина почти не уходит в занос даже на скорости\n\nРаботает в паре с REAR_GRIP: маленькая saturation + большой REAR = острый короткий срыв. Большая saturation + маленький REAR = плавный долгий занос." },
    { key: "INERTIA_SCALE", min: 0.2, max: 4.0, step: 0.05, unit: "x",
      short: "Инерция вращения кузова. Выше = более 'тяжёлые' медленные повороты",
      detail: "Насколько 'тяжело' кузов начинает крутиться и насколько долго продолжает после руля. Это даёт ощущение веса машины.\n\nОриентиры:\n• 0.3: машина юркая, разворачивается мгновенно, ощущается невесомой\n• 1.2 (дефолт): чувствуется вес, кузов нужно 'раскрутить' — нет дёрганья\n• 2.5: тяжёлая машина, реагирует с заметной задержкой\n• 4: 'танк', нужно крутить руль заранее\n\nЕсли машина дёргается от лёгкого руля → увеличь. Если занос вялый и тупой → уменьши." },
    { key: "OMEGA_DAMPING", min: 0.5, max: 15, step: 0.25, unit: "/s",
      short: "Как быстро вращение кузова затухает после отпускания руля",
      detail: "Когда отпускаешь руль, кузов продолжает вращаться по инерции. Этот параметр — скорость затухания этого вращения (по экспоненте, framerate-independent).\n\nОриентиры:\n• 1: машина продолжает крутиться долго как юла после отпускания руля\n• 4 (дефолт): кузов стабилизируется за ~0.25 секунды — комфортно\n• 8: вращение гасится почти мгновенно за ~0.1 секунды\n• 14: вращение прекращается мгновенно (рывок)\n\nЕсли после поворота машину 'заносит ещё' и она крутится в холостую → увеличь. Если повороты ощущаются 'деревянными' и заканчиваются резко → уменьши." },
    { key: "STATIONARY_OMEGA_KICK", min: 0, max: 8, step: 0.25, unit: "rad/s²",
      deps: ["STATIONARY_STEER_THRESHOLD"],
      short: "Помощь при развороте на месте. Сила вращения когда машина почти стоит",
      detail: "Bicycle-модель не позволяет машине крутиться стоя (как в реальности). Этот параметр добавляет 'аркадную' помощь — лёгкий толчок вращения когда скорость почти ноль. Плавно отключается выше STATIONARY_STEER_THRESHOLD.\n\nОриентиры:\n• 0: чистая физика — стоя не повернуть, нужно тронуться\n• 1: лёгкая помощь, разворот стоя медленный\n• 2.5 (дефолт): комфортно, разворот за ~1 секунду\n• 6: бойко, машина 'вертится' на месте\n• 8: волчком" },
    { key: "DRIFT_MAX_SLIP_SPEED", min: 2, max: 20, step: 0.5, unit: "m/s",
      short: "При какой боковой скорости задних колёс показывает 'полный занос' (intensity=1)",
      detail: "Это нормировка: на какой скорости скольжения интенсивность дрифта достигает максимума (включает дым на полную, наклон кузова на максимум).\n\nОриентиры:\n• 3: даже лёгкий снос показывает 'полный дрифт' — VFX везде\n• 8 (дефолт): баланс — дым нарастает плавно, максимум при сильном заносе\n• 14: интенсивность нарастает медленно, дым только в реально глубоком дрифте\n\nЭто чисто визуальный/аудио параметр — на физику дрифта не влияет." },
    { key: "OMEGA_LEAN_SCALE", min: 0.5, max: 8, step: 0.25, unit: "rad/s",
      deps: ["VISUAL_DRIFT_MAX_DEG"],
      short: "При какой угловой скорости кузов наклоняется максимально. Чисто визуально",
      detail: "Кузов в дрифте 'кладётся' в сторону противоположную направлению вращения (как реальная машина в повороте). Этот параметр — на какой скорости вращения наклон максимален.\n\nОриентиры:\n• 1.5: кузов завален даже в лёгком вираже\n• 3 (дефолт): крен заметен в активном дрифте\n• 5: крен только в очень резких поворотах\n\nНа физику не влияет — только на эстетику." },
    { key: "WHEELBASE_OVERRIDE", min: 0.0, max: 3.0, step: 0.05, unit: "m",
      short: "Длина колёсной базы. 0 = измерить автоматически из 3D-модели",
      detail: "Расстояние между передней и задней осью. По умолчанию 0 — система сама измеряет из модели. Меняй вручную только если хочешь изменить ощущение длины машины без правки меша.\n\nОриентиры:\n• 0: авто (рекомендуется)\n• 0.6: короткая база — машина крутится на месте, дуги тугие\n• 1.0-1.2: типичный карт\n• 2.0: длинная база — широкие плавные дуги, тяжело разворачивается" },
    { key: "TRACK_WIDTH_OVERRIDE", min: 0.0, max: 2.0, step: 0.05, unit: "m",
      short: "Ширина между левым и правым колесом. 0 = из 3D-модели",
      detail: "Расстояние между L и R задним колесом. Влияет на разницу следов левого и правого колеса в дрифте — чем шире, тем сильнее они расходятся.\n\nОриентиры:\n• 0: авто (рекомендуется)\n• 0.6-1.0: типичный карт\n• 1.5: широкая база, расхождение следов очень заметное\n\nЭто декоративный параметр; на физику влияет минимально." },
  ],
  "Drift state machine v3.1 (auto-trigger)": [
    { key: "AUTO_DRIFT_ENABLED", min: 0, max: 1, step: 1, unit: "",
      short: "Включить авто-дрифт (1) или работать на чистой bicycle физике (0)",
      detail: "Главный выключатель v3.1.\n\n0 — машина едет только на bicycle физике (текущий тюнинг). Никакого визуального yaw-offset, snap-grip, forward-assist. Стабильно, но дрифта почти нет.\n\n1 — auto-drift state machine накладывает поверх bicycle: при острых поворотах на скорости визуально кладёт кузов на ±22°, ослабляет задний грип, добавляет поворот, чуть-чуть тянет вперёд.\n\nПереключай если хочешь сравнить feel чистой физики и физики с overlay." },
    { key: "DRIFT_ENTER_STEER", min: 0.3, max: 0.95, step: 0.05, unit: "",
      short: "Сколько надо вкрутить руль (0..1) чтобы начался дрифт",
      detail: "Ориентиры:\n• 0.4: дрифтит почти от любого поворота — слишком чувствительно, машина дёргается\n• 0.65 (дефолт): только на острых виражах, плавные дуги остаются обычной ездой\n• 0.85: только при полном руле — нужно явное намерение\n\nЕсли дрифт не входит → снизь до 0.5. Если дрифтит когда не надо → подними до 0.8." },
    { key: "DRIFT_ENTER_SPEED", min: 1, max: 25, step: 0.5, unit: "m/s",
      short: "Минимальная скорость для активации дрифта",
      detail: "Ниже этой скорости дрифт не запускается, какой бы руль не был. Защита от 'дрифт стоя'.\n\nОриентиры:\n• 3: дрифтит даже еле едет — нелогично\n• 7 (дефолт): только на нормальной скорости\n• 15: только на гонке, при манёврах в яме не дрифтит" },
    { key: "DRIFT_ENTER_DEBOUNCE", min: 0.0, max: 0.5, step: 0.02, unit: "s",
      short: "Сколько секунд держать руль чтоб начался дрифт",
      detail: "Антидребезг — отсеивает короткие случайные дёргания руля.\n\nОриентиры:\n• 0: дрифт мгновенный, может срабатывать на одном фрейме шума\n• 0.12 (дефолт): нужно ~7 кадров уверенного руля\n• 0.3: нужно явное долгое намерение, дрифт ощущается тяжелее" },
    { key: "DRIFT_EXIT_STEER", min: 0.1, max: 0.6, step: 0.05, unit: "",
      short: "Уровень руля при котором дрифт выключается (гистерезис)",
      detail: "Должен быть НИЖЕ DRIFT_ENTER_STEER чтобы не было дребезга на границе.\n\nОриентиры:\n• 0.5: дрифт обрывается рано — едва ослабил руль\n• 0.35 (дефолт): можно слегка корректировать в дрифте, не теряя его\n• 0.2: дрифт держится почти до полного отпускания руля\n\nЕсли дрифт выключается слишком рано → снизь. Если 'залипает' → подними." },
    { key: "DRIFT_EXIT_SPEED", min: 0.5, max: 15, step: 0.5, unit: "m/s",
      short: "Скорость ниже которой дрифт автоматически обрывается",
      detail: "Когда машина замедлилась ниже этого порога — выходим из дрифта, даже если руль ещё держится.\n\nОриентиры:\n• 1: дрифт можно тащить почти до остановки\n• 4 (дефолт): автоматически выходишь когда тормозишь" },
    { key: "DRIFT_EXIT_DURATION", min: 0.05, max: 1.0, step: 0.05, unit: "s",
      short: "Сколько длится EXITING фаза (для буста и timer'а recovery)",
      detail: "Это длительность state EXITING — окно для exit-boost и связанных таймеров. На плавность визуала влияет НЕ ПРЯМО (за неё отвечает DRIFT_ENGAGE_OUT_RATE), здесь — только общая длина 'выходного окна' state machine'ы.\n\nОриентиры:\n• 0.1: короткое окно, буст быстро гаснет\n• 0.3 (дефолт): комфортно\n• 0.6: длинное окно — буст волной, recovery успевает доработать" },
    { key: "DRIFT_VISUAL_OFFSET_DEG", min: 5, max: 45, step: 1, unit: "°",
      short: "На сколько градусов кузов визуально 'кладётся' в дрифте",
      detail: "Главная ручка драматичности — насколько визуальная ось машины отклонится от физического направления движения.\n\nОриентиры:\n• 10: еле заметный наклон, дрифт скучный\n• 22 (дефолт): как в SmashKarts, явный занос\n• 35: почти боком, очень театрально\n• 45: машина смотрит в сторону движения почти под прямым углом" },
    { key: "DRIFT_VISUAL_SMOOTH_RATE", min: 1.0, max: 15.0, step: 0.5, unit: "/s",
      short: "[deprecated v3.1.1] Используй DRIFT_ENGAGE_IN_RATE / OUT_RATE",
      detail: "Раньше один параметр управлял всем — сейчас разделён на ENGAGE_IN_RATE (вход) и OUT_RATE (выход). Этот ключ оставлен для обратной совместимости, не используется в коде если IN/OUT_RATE заданы." },
    { key: "DRIFT_ENGAGE_IN_RATE", min: 1.0, max: 15.0, step: 0.5, unit: "/s",
      short: "Как плавно дрифт включается (1/с) — ВХОД",
      detail: "Скорость нарастания engage envelope при входе в дрифт. Все эффекты (грип, yaw bonus, тяга, визуал) масштабируются на этот envelope.\n\nОриентиры:\n• 1.5: очень плавный fade-in за ~0.5+ сек, дрифт нарастает мягко\n• 3.5 (дефолт): ~0.2 сек до полного — комфортно, не дёргает\n• 8: за ~0.1 сек, заметна резкость\n• 15: защёлк, толчок\n\nЕсли вход в дрифт ощущается резким → снижай. Если ленивый → повышай." },
    { key: "DRIFT_ENGAGE_OUT_RATE", min: 0.5, max: 10.0, step: 0.25, unit: "/s",
      short: "Как плавно дрифт выключается (1/с) — ВЫХОД",
      detail: "Скорость затухания engage envelope при выходе. Обычно стоит ставить чуть медленнее IN_RATE — резкое выключение ощущается как обрыв, плавное даёт 'послевкусие' дрифта.\n\nОриентиры:\n• 1.0: очень плавный fade-out за ~0.7 сек, кузов медленно выпрямляется\n• 2.5 (дефолт): ~0.3 сек, естественно\n• 5: за ~0.15 сек, быстро\n• 10: щёлк назад" },
    { key: "DRIFT_RECOVERY_RATE", min: 1.0, max: 12.0, step: 0.5, unit: "/s",
      short: "Скорость затухания snap-grip overlay после выхода (борется с ghost-slide)",
      detail: "Recovery overlay — это разовый импульс который повышает rear_grip ВЫШЕ нормального сразу после выхода из ACTIVE. Он гасит остаточное боковое скольжение которое иначе тянулось бы 0.5+ сек.\n\nОриентиры:\n• 1.5: overlay тянется ~0.7 сек, машина залипает в траектории дрифта дольше\n• 4.0 (дефолт): ~0.25 сек, ghost-slide почти не видно\n• 8: моментально, может ощущаться 'жёстко'\n\nЕсли после выхода машинку всё равно несёт вбок → ПОВЫШАЙ DRIFT_EXIT_GRIP_MULT и СНИЖАЙ этот rate (overlay действует дольше)." },
    { key: "DRIFT_EXIT_GRIP_MULT", min: 1.0, max: 4.0, step: 0.1, unit: "x",
      short: "Множитель к REAR_GRIP в момент выхода — гасит остаточное скольжение",
      detail: "Сразу после выхода из ACTIVE применяется overlay: rear_grip × этот множитель (затухает по DRIFT_RECOVERY_RATE).\n\nОриентиры:\n• 1.0: overlay не работает, ghost-slide тянется естественно\n• 1.8 (дефолт): задние колёса ~2x жёстче нормы — слайд гасится за ~0.2 сек\n• 2.5: очень агрессивный snap-grip, машина 'резко выпрямляется'\n• 4.0: почти clamp, может ощущаться неестественно\n\nГЛАВНОЕ если после дрифта продолжается небольшое боковое скольжение → подними сюда." },
    { key: "DRIFT_REAR_GRIP_MULT", min: 0.05, max: 1.0, step: 0.05, unit: "x",
      short: "Во сколько раз срывается задняя ось В дрифте (множитель к REAR_GRIP)",
      detail: "Только в ACTIVE: rear_grip × этот множитель.\n\nОриентиры:\n• 0.1: почти нет грипа — машина едет почти боком\n• 0.35 (дефолт): явный занос но контролируемый\n• 0.7: еле заметный занос\n• 1.0: grip не меняется (только визуальный yaw)\n\nЕсли зад не заносит — снижай. Если заносит слишком сильно — повышай." },
    { key: "DRIFT_YAW_BONUS", min: 0.0, max: 4.0, step: 0.1, unit: "rad/s",
      short: "Дополнительная угловая скорость в дрифте — машина 'ввинчивается'",
      detail: "Прибавляется к омеге пока ACTIVE. Делает дрифт-разворот резче чем чистая физика.\n\nОриентиры:\n• 0: нет довинчивания, дрифт мягкий\n• 1.4 (дефолт): дрифт реально режет траекторию\n• 3: машина крутится в дрифте слишком сильно, легко можно сделать 540°" },
    { key: "DRIFT_FORWARD_ASSIST", min: 0.0, max: 15.0, step: 0.5, unit: "m/s²",
      short: "Доп. тяга вперёд в дрифте — компенсирует потерю скорости",
      detail: "В дрифте машина естественно тормозит от drag/cornering. Этот параметр частично компенсирует, чтобы дрифт не убивал темп полностью.\n\nОриентиры:\n• 0: в дрифте сильно тормозишь — заметная потеря скорости\n• 3 (дефолт): на входе чуть притормаживает (как в SmashKarts), но не топчешься на месте\n• 6: дрифт почти не теряет скорости\n• 12: дрифт ускоряет — нерелистично\n\nЕсли вход в поворот совсем не тормозит → снижай этот параметр И повышай CORNERING_DRAG_COEFF." },
    { key: "DRIFT_POWER_FULL_TIME", min: 0.3, max: 4.0, step: 0.1, unit: "s",
      short: "За сколько секунд накапливается полный power (для индикатора и буста)",
      detail: "Power линейно растёт от 0 до 1 за это время в ACTIVE. Используется для UI индикатора и для проверки права на буст.\n\nОриентиры:\n• 0.5: power копится мгновенно\n• 1.5 (дефолт): надо подержать дрифт\n• 4: только за длинный дрифт" },
    { key: "DRIFT_MIN_ACTIVE_FOR_BOOST", min: 0.0, max: 3.0, step: 0.1, unit: "s",
      short: "Минимум секунд дрифта чтоб на выходе дали буст",
      detail: "Если был в ACTIVE дольше этого порога — на выходе автоматически вылетает forward boost.\n\nОриентиры:\n• 0.3: буст почти за любое касание\n• 0.7 (дефолт): за осознанный дрифт\n• 2: только за длинный дрифт" },
    { key: "DRIFT_EXIT_BOOST_FORCE", min: 0.0, max: 30.0, step: 1.0, unit: "m/s²",
      short: "Сила буста на выходе из дрифта",
      detail: "Forward force (затухает линейно за DRIFT_EXIT_BOOST_DURATION).\n\nОриентиры:\n• 0: буста нет\n• 14 (дефолт): заметный рывок ~30% скорости\n• 30: реактивный выстрел" },
    { key: "DRIFT_EXIT_BOOST_DURATION", min: 0.1, max: 2.0, step: 0.05, unit: "s",
      short: "Сколько длится буст на выходе из дрифта",
      detail: "Линейный fade-out от EXIT_BOOST_FORCE до 0.\n\nОриентиры:\n• 0.2: короткий толчок\n• 0.5 (дефолт): комфортный сприт\n• 1.5: длинная волна ускорения" },
  ],
  "Дрифт (сигналы и эффекты)": [
    { key: "DRIFT_MIN_SPEED", min: 0.5, max: 8.0, step: 0.5, unit: "m/s",
      short: "Минимальная скорость для активации дрифт-эффектов (дым, наклон)",
      detail: "Ниже этой скорости интенсивность дрифта принудительно гасится в 0 — нет дыма и наклона кузова, даже если задние колёса формально скользят.\n\nЗащищает от 'phantom drift' стоя или почти стоя.\n\nОриентиры:\n• 1: эффекты почти всегда видны\n• 2.5 (дефолт): начинаются с медленной езды\n• 5: только когда едешь действительно быстро" },
    { key: "SLIP_SMOOTHING", min: 1, max: 20, step: 0.5, unit: "/s",
      short: "Скорость с которой intensity нарастает к реальному заносу",
      detail: "Сглаживает скачки от мгновенного слипа в плавную интенсивность для VFX и наклона. Half-life ≈ ln(2)/value.\n\nОриентиры:\n• 2: дым медленно нарастает (~350мс задержка) — расслабленно\n• 5 (дефолт): half-life ~140мс — стандарт\n• 12: почти мгновенный отклик — может дёргаться на bumps\n\nЕсли дым 'отстаёт' от заноса → увеличь. Если дёргается → уменьши." },
    { key: "DRIFT_ACTIVE_THRESHOLD", min: 0.3, max: 0.95, step: 0.05, unit: "",
      short: "С какой интенсивности включается флаг 'is_drifting' (звук, доп эффекты)",
      detail: "Только VFX/audio триггер — не влияет на физику. Использует мини-гистерезис ±0.02 чтобы флаг не дёргался у границы.\n\nОриентиры:\n• 0.3: флаг активен почти всегда в повороте\n• 0.55 (дефолт): флаг включается на серьёзном дрифте\n• 0.8: только в глубоком заносе" },
    { key: "VFX_SMOKE_THRESHOLD", min: 0.1, max: 10, step: 0.25, unit: "m/s",
      short: "При какой боковой скорости каждого заднего колеса включается дым",
      detail: "В v3.0 порог проверяется НЕЗАВИСИМО для левого и правого заднего колеса. Внешнее колесо в повороте скользит сильнее — дым с одной стороны включится раньше другой.\n\nОриентиры:\n• 0.3: дым от любого касания руля\n• 0.5 (дефолт): дым в активных поворотах\n• 2: только в реальном заносе\n• 5: только в экстремальном дрифте" },
    { key: "DRIFT_DRAG_MULTIPLIER", min: 1.0, max: 3.0, step: 0.05, unit: "x",
      deps: ["K_DRAG", "ACCEL_FORCE"],
      short: "Доп воздушное сопротивление в дрифте. Снижает терминальную скорость когда дрифтуешь",
      detail: "active_k_drag = K_DRAG × lerp(1, MULT, drift_intensity). В дрифте — больше торможение от воздуха.\n\nОриентиры:\n• 1.0: нет эффекта\n• 1.5: в дрифте топ ≈ 82% обычного\n• 2.6 (дефолт): топ ≈ 67% — заметное замедление\n• 3: дрифт реально 'стоит' скорости" },
    { key: "DRIFT_ROLLING_MULTIPLIER", min: 1.0, max: 2.0, step: 0.05, unit: "x",

const safeNum = (v, fb = 0) => (typeof v === "number" && isFinite(v)) ? v : fb;
const fmt = (v, d = 1) => isFinite(v) ? v.toFixed(d) : "—";

const FORMULAS = {
  "MAX_SPEED": p => `${fmt(safeNum(p.MAX_SPEED) * 3.6, 0)} km/h (референс)`,
  "ACCEL_FORCE": p => {
    const a = safeNum(p.ACCEL_FORCE);
    const d = safeNum(p.K_DRAG);
    const term = d > 0 ? Math.sqrt(a / d) : NaN;
    return `Терминалка ≈ ${fmt(term, 1)} m/s (${fmt(term * 3.6, 0)} km/h)`;
  },
  "K_DRAG": p => {
    const a = safeNum(p.ACCEL_FORCE);
    const d = safeNum(p.K_DRAG);
    const term = d > 0 ? Math.sqrt(a / d) : NaN;
    return `Терминалка ≈ ${fmt(term, 1)} m/s`;
  },
  "K_ROLLING": p => `Drag@5m/s: ${fmt(safeNum(p.K_ROLLING) * 5, 1)} m/s² │ @15m/s: ${fmt(safeNum(p.K_ROLLING) * 15, 1)}`,
  "BRAKE_FORCE": p => {
    const maxV = safeNum(p.MAX_SPEED);
    const total = safeNum(p.BRAKE_FORCE) + safeNum(p.K_ROLLING) * maxV + safeNum(p.K_DRAG) * maxV * maxV;
    return `Стоп с max (~${fmt(maxV, 0)} m/s): ~${fmt(maxV / total, 2)}s`;
  },
  "REVERSE_RATIO": p => {
    const term = safeNum(p.K_DRAG) > 0 ? Math.sqrt(safeNum(p.ACCEL_FORCE) * safeNum(p.REVERSE_RATIO) / safeNum(p.K_DRAG)) : NaN;
    return `Reverse top: ${fmt(term, 1)} m/s`;
  },
  "STEER_SLEW_IN": p => {
    const s = safeNum(p.STEER_SLEW_IN);
    return `Полный руль за ${fmt(s > 0 ? 1 / s : 0, 2)}s`;
  },
  "STEER_SLEW_OUT": p => {
    const s = safeNum(p.STEER_SLEW_OUT);
    return `Центр за ${fmt(s > 0 ? 1 / s : 0, 2)}s`;
  },
  "THROTTLE_SLEW": p => `Полный газ за ${fmt(safeNum(p.THROTTLE_SLEW) > 0 ? 1 / p.THROTTLE_SLEW : 0, 2)}s`,
  "STEER_VISUAL_RATE": p => {
    const r = safeNum(p.STEER_VISUAL_RATE);
    return `Half-life ≈ ${fmt(r > 0 ? Math.LN2 / r : 0, 2)}s`;
  },
  "STEERING_SPEED": p => `Тихо: ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STEER_LOW_MULT))} │ Макс: ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STEER_HIGH_MULT))} rad/s`,
  "STEER_LOW_MULT": p => `= ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STEER_LOW_MULT))} rad/s на v≈0`,
  "STEER_HIGH_MULT": p => `= ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STEER_HIGH_MULT))} rad/s на max`,
  "STEER_SPEED_THRESHOLD": p => `Полный руль от ${fmt(safeNum(p.STEER_SPEED_THRESHOLD))} m/s`,
  "STATIONARY_STEER_THRESHOLD": p => `Хак активен при v < ${fmt(safeNum(p.STATIONARY_STEER_THRESHOLD))} m/s`,
  "STATIONARY_STEER_SCALE": p => `Yaw стоя: ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STATIONARY_STEER_SCALE))} rad/s (${fmt(safeNum(p.STATIONARY_STEER_SCALE) * 100, 0)}% полного)`,
  "WHEEL_RADIUS": p => {
    const r = safeNum(p.WHEEL_RADIUS);
    return r > 0 ? `${fmt(safeNum(p.MAX_SPEED) / r / (2 * Math.PI), 0)} об/с на макс` : "—";
  },
  "HIGH_GRIP": p => `За 0.1с гасит ${fmt((1 - Math.exp(-safeNum(p.HIGH_GRIP) * 0.1)) * 100, 0)}% бокового`,
  "LOW_GRIP": p => {
    const g = safeNum(p.LOW_GRIP);
    return `Half-life: ${fmt(g > 0 ? Math.LN2 / g : 0, 2)}s │ 1с: -${fmt((1 - Math.exp(-g)) * 100, 0)}%`;
  },
  "GRIP_LOSS_RATE": p => {
    const delta = safeNum(p.HIGH_GRIP) - safeNum(p.LOW_GRIP);
    const r = safeNum(p.GRIP_LOSS_RATE);
    return `HIGH→LOW: ${fmt(r > 0 ? delta / r : 0, 2)}s`;
  },
  "GRIP_RECOVERY_RATE": p => {
    const delta = safeNum(p.HIGH_GRIP) - safeNum(p.LOW_GRIP);
    const r = safeNum(p.GRIP_RECOVERY_RATE);
    return `LOW→HIGH: ${fmt(r > 0 ? delta / r : 0, 2)}s`;
  },
  "DRIFT_MIN_SPEED": p => `Hard gate: drift disabled при fwd_speed < ${fmt(safeNum(p.DRIFT_MIN_SPEED, 3.0))} m/s`,
  "DRIFT_MAX_SLIP_ANGLE_DEG": p => {
    const a = safeNum(p.DRIFT_MAX_SLIP_ANGLE_DEG, 35);
    const needed = Math.tan(a * Math.PI / 180) * 20;
    return `При fwd=20 м/с: side ≈ ${fmt(needed, 1)} m/s → slip_ratio=1.0`;
  },
  "SLIP_SMOOTHING": p => {
    const r = safeNum(p.SLIP_SMOOTHING, 8);
    return `Half-life: ${fmt(r > 0 ? Math.LN2 / r : 0, 3)}s │ 60fps alpha: ${fmt(1 - Math.exp(-r/60), 3)}`;
  },
  "DRIFT_INTENT_MULTIPLIER": p => {
    const m = safeNum(p.DRIFT_INTENT_MULTIPLIER, 0.4);
    return `При |steer|=1.0: effective steer = 1 + ${fmt(m, 2)} = ${fmt(1 + m, 2)}`;
  },
  "DRIFT_INTENT_THRESHOLD": p => {
    const t = safeNum(p.DRIFT_INTENT_THRESHOLD, 0.7);
    const m = safeNum(p.DRIFT_INTENT_MULTIPLIER, 0.4);
    const at80 = Math.max(0, Math.min(1, (0.8 - t) / (1 - t)));
    const smoothstep80 = at80 * at80 * (3 - 2 * at80);
    return `При |steer|=0.8 → aid=${fmt(smoothstep80 * m, 3)}`;
  },
  "GRIP_SLIP_EXPONENT": p => {
    const e = safeNum(p.GRIP_SLIP_EXPONENT, 2.0);
    const hi = safeNum(p.HIGH_GRIP, 29);
    const lo = safeNum(p.LOW_GRIP, 1);
    const grip50 = hi + (lo - hi) * Math.pow(0.5, e);
    const grip70 = hi + (lo - hi) * Math.pow(0.7, e);
    return `intensity=0.5 → grip=${fmt(grip50, 1)} │ 0.7 → ${fmt(grip70, 1)}`;
  },
  "DRIFT_YAW_MULTIPLIER": p => `При intensity=1.0: +${fmt((safeNum(p.DRIFT_YAW_MULTIPLIER) - 1) * 100, 0)}% поворота`,
  "GRIP_LOSS_RATE": p => `[deprecated] При 0.0 — intensity path active`,
  "GRIP_RECOVERY_RATE": p => `[deprecated] При 0.0 — intensity path active`,
  "DRIFT_ACTIVE_THRESHOLD": p => {
    const t = safeNum(p.DRIFT_ACTIVE_THRESHOLD, 0.55);
    return `VFX on при intensity > ${fmt(t + 0.02, 2)} │ off при < ${fmt(t - 0.02, 2)} (mini-hyst)`;
  },
  "DRIFT_DRAG_MULTIPLIER": p => {
    const a = safeNum(p.ACCEL_FORCE); const kd = safeNum(p.K_DRAG); const m = safeNum(p.DRIFT_DRAG_MULTIPLIER, 1);
    const vn = kd > 0 ? Math.sqrt(a / kd) : 0;
    const vd = (kd * m) > 0 ? Math.sqrt(a / (kd * m)) : 0;
    return `Terminal drift: ${fmt(vd)} m/s (${fmt(vn > 0 ? vd / vn * 100 : 0, 0)}% от нормального)`;
  },
  "CORNERING_DRAG_COEFF": p => {
    const c = safeNum(p.CORNERING_DRAG_COEFF, 0.3);
    const at5 = c * 5; const at10 = c * 10;
    return `side=5 м/с → -${fmt(at5, 1)} м/с²  |  side=10 м/с → -${fmt(at10, 1)} м/с²`;
  },
  "DRIFT_ROLLING_MULTIPLIER": p => {
    const kr = safeNum(p.K_ROLLING); const m = safeNum(p.DRIFT_ROLLING_MULTIPLIER, 1);
    return `Effective rolling в дрифте: ${fmt(kr * m, 2)} (×${fmt(m, 2)})`;
  },
  "VFX_SMOKE_THRESHOLD": p => `Дым от ${fmt(safeNum(p.VFX_SMOKE_THRESHOLD))} m/s бокового`,
  "VISUAL_DRIFT_MAX_DEG": p => `Наклон в дрифте: ±${fmt(safeNum(p.VISUAL_DRIFT_MAX_DEG), 0)}°`,
  "DEBUG_VECTORS": p => `${safeNum(p.DEBUG_VECTORS) > 0 ? "ВКЛ ✓" : "выкл"}`,
  "GRAVITY": p => `${fmt(safeNum(p.GRAVITY) / 9.8, 1)}× Земля │ 3м: ${fmt(Math.sqrt(6 / safeNum(p.GRAVITY, 1)), 2)}s`,
  "SLOPE_INFLUENCE": p => `30°: ±${fmt(0.5 * safeNum(p.SLOPE_INFLUENCE))} m/s²`,
  "ROCKET_SPEED": p => {
    const mx = safeNum(p.MAX_SPEED);
    return `${fmt(mx > 0 ? safeNum(p.ROCKET_SPEED) / mx : 0, 1)}× карта │ ${fmt(safeNum(p.ROCKET_SPEED) * 3.6, 0)} km/h`;
  },
  "ROCKET_LIFETIME": p => `Дальность: ${fmt(safeNum(p.ROCKET_SPEED) * safeNum(p.ROCKET_LIFETIME), 0)}м`,
  "DAMAGE": p => {
    const d = safeNum(p.DAMAGE);
    return d > 0 ? `${Math.ceil(100 / d)} попаданий = смерть` : "—";
  },
  "CAMERA_HEIGHT": p => {
    const d = safeNum(p.CAMERA_DISTANCE);
    return `Угол: ${d > 0 ? fmt(Math.atan(safeNum(p.CAMERA_HEIGHT) / d) * 180 / Math.PI, 0) : "—"}°`;
  },
  "FOV_SPEED_BOOST": p => `На макс: ${fmt(safeNum(p.FOV) + safeNum(p.FOV_SPEED_BOOST), 0)}°`,
};

// Whitelist of keys that tuner is allowed to write. Prevents zombie keys from
// pre-v2 params getting resurrected when the file is saved.
const ALLOWED_KEYS = new Set();
for (const group of Object.values(PARAMS)) {
  for (const p of group) ALLOWED_KEYS.add(p.key);
}

let currentData = {};
let originalData = {};
let saveTimeout = null;

async function loadParams() {
  try {
    const r = await fetch("/params");
    currentData = await r.json();
    originalData = JSON.parse(JSON.stringify(currentData));
    render();
    setStatus("Loaded", "");
  } catch(e) {
    setStatus("Error loading: " + e.message, "error");
  }
}

function setStatus(text, cls) {
  const el = document.getElementById("status");
  el.textContent = text;
  el.className = "status " + (cls || "");
}

function render() {
  const container = document.getElementById("groups");
  container.innerHTML = "";

  for (const [groupName, params] of Object.entries(PARAMS)) {
    const group = document.createElement("div");
    group.className = "group";
    group.innerHTML = `<h2>${groupName}</h2>`;

    for (const p of params) {
      const val = currentData[p.key] ?? 0;
      const changed = val !== originalData[p.key];
      const div = document.createElement("div");
      div.className = "param" + (changed ? " changed" : "");
      div.id = "param-" + p.key;

      const formula = FORMULAS[p.key] ? FORMULAS[p.key](currentData) : "";
      const hasDetail = p.detail && p.detail.length > 0;

      const depsHtml = (p.deps && p.deps.length) ?
        `<div class="dep-section">↔ ${p.deps.map(d => `<span class="dep-tag" onclick="scrollToParam('${d}')" title="Зависимый параметр">${d}</span>`).join(" ")}</div>` : "";
      // Build reverse deps display
      const affectedBy = [];
      for (const [gn, gp] of Object.entries(PARAMS)) {
        for (const op of gp) {
          if (op.deps && op.deps.includes(p.key)) affectedBy.push(op.key);
        }
      }
      const affectedHtml = affectedBy.length ?
        `<span class="dep-badge" title="Влияет на: ${affectedBy.join(', ')}">↑ ${affectedBy.length}</span>` : "";

      div.innerHTML = `
        <div class="param-row">
          <span class="param-name">${p.key}</span>${affectedHtml}
          <input type="range" class="param-slider" id="slider-${p.key}" min="${p.min}" max="${p.max}" step="${p.step}" value="${val}">
          <input type="number" class="param-num" id="num-${p.key}" min="${p.min}" max="${p.max}" step="${p.step}" value="${val}">
          <span class="param-unit">${p.unit}</span>
        </div>
        <div class="param-info">
          <span class="param-short">${p.short}</span>
          ${formula ? `<span class="param-formula">${formula}</span>` : ""}
          ${hasDetail ? `<span class="param-expand" onclick="this.parentElement.nextElementSibling.classList.toggle('open')">\u25BC</span>` : ""}
        </div>
        ${hasDetail ? `<div class="param-detail">${p.detail.replace(/\\n/g, '<br>')}</div>` : ""}
        ${depsHtml}
      `;
      group.appendChild(div);

      setTimeout(() => {
        const slider = document.getElementById("slider-" + p.key);
        const num = document.getElementById("num-" + p.key);
        if (!slider || !num) return;

        const update = (v) => {
          const val = parseFloat(v);
          if (isNaN(val)) return; // guard: empty field or invalid input
          currentData[p.key] = val;
          slider.value = val;
          num.value = val;
          const wrap = document.getElementById("param-" + p.key);
          if (val !== originalData[p.key]) wrap.classList.add("changed");
          else wrap.classList.remove("changed");
          updateFormulas();
          highlightDeps(p.key);
          autoSave();
        };
        slider.addEventListener("input", e => update(e.target.value));
        num.addEventListener("input", e => update(e.target.value));
      }, 0);
    }
    container.appendChild(group);
  }
}

function updateFormulas() {
  for (const [groupName, params] of Object.entries(PARAMS)) {
    for (const p of params) {
      const fn = FORMULAS[p.key];
      if (!fn) continue;
      const el = document.getElementById("param-" + p.key);
      if (!el) continue;
      const formulaSpan = el.querySelector(".param-formula");
      try {
        const text = fn(currentData);
        if (formulaSpan) formulaSpan.textContent = text;
      } catch(e) {}
    }
  }
}

function autoSave() {
  if (!document.getElementById("autosave").checked) return;
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(save, 300);
}

async function save() {
  clearTimeout(saveTimeout);
  try {
    const full = {};
    // Only write keys that are: (a) underscore comments/sections, or (b) in our allowed list.
    // Unknown keys get dropped — prevents pre-v2 zombies from being resurrected.
    for (const [k, v] of Object.entries(currentData)) {
      if (k.startsWith("_") || ALLOWED_KEYS.has(k)) full[k] = v;
    }
    for (const [k, v] of Object.entries(originalData)) {
      if (k.startsWith("_") && !(k in full)) full[k] = v;
    }

    const r = await fetch("/params", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(full, null, 2),
    });
    if (r.ok) {
      setStatus("Saved! Hot-reload ~0.5s", "saved");
      setTimeout(() => setStatus("", ""), 2000);
    } else {
      setStatus("Save error: " + r.status, "error");
    }
  } catch(e) {
    setStatus("Save error: " + e.message, "error");
  }
}

function scrollToParam(key) {
  const el = document.getElementById("param-" + key);
  if (!el) return;
  el.scrollIntoView({ behavior: "smooth", block: "center" });
  el.classList.add("dep-affected");
  setTimeout(() => el.classList.remove("dep-affected"), 2000);
}

// Highlight dependent params when a value changes
function highlightDeps(key) {
  // Find params that list this key in their deps
  for (const [gn, gp] of Object.entries(PARAMS)) {
    for (const p of gp) {
      if (p.deps && p.deps.includes(key)) {
        const el = document.getElementById("param-" + p.key);
        if (el) {
          el.classList.add("dep-affected");
          setTimeout(() => el.classList.remove("dep-affected"), 1500);
        }
      }
    }
  }
  // Also highlight params that this key depends on
  for (const [gn, gp] of Object.entries(PARAMS)) {
    for (const p of gp) {
      if (p.key === key && p.deps) {
        for (const d of p.deps) {
          const el = document.getElementById("param-" + d);
          if (el) {
            el.classList.add("dep-affected");
            setTimeout(() => el.classList.remove("dep-affected"), 1500);
          }
        }
      }
    }
  }
}

loadParams();
</script>
</body>
</html>
