<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Kart Physics Tuner</title>
<style>
  :root { --bg: #1a1a2e; --card: #16213e; --accent: #0f3460; --hi: #e94560; --text: #eee; --dim: #888; --green: #4ecca3; --blue: #7fb3d3; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 16px; }
  h1 { text-align: center; margin-bottom: 6px; font-size: 1.4em; }
  .status { text-align: center; margin-bottom: 12px; color: var(--dim); font-size: 0.85em; min-height: 1.2em; }
  .status.saved { color: var(--green); }
  .status.error { color: var(--hi); }
  .toolbar { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .autosave-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.85em; color: var(--dim); }
  .autosave-toggle input { accent-color: var(--hi); }
  button { padding: 7px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85em; font-weight: 600; transition: all 0.15s; }
  .btn-save { background: var(--hi); color: white; }
  .btn-save:hover { background: #ff6b81; }
  .btn-reset { background: var(--accent); color: var(--text); }
  .btn-reset:hover { background: #1a4a80; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 1400px; margin: 0 auto; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  .group { background: var(--card); border-radius: 10px; padding: 14px 16px; }
  .group h2 { color: var(--hi); font-size: 0.95em; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 6px; }
  .param { margin-bottom: 12px; }
  .param:last-child { margin-bottom: 0; }
  .param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .param-name { font-weight: 700; font-size: 0.82em; color: var(--green); font-family: monospace; min-width: 0; white-space: nowrap; }
  .param-slider { flex: 1; accent-color: var(--hi); height: 5px; min-width: 60px; }
  .param-num { width: 68px; background: var(--accent); border: 1px solid #444; color: var(--text); padding: 3px 6px; border-radius: 5px; font-size: 0.85em; text-align: center; }
  .param-num:focus { outline: 1px solid var(--hi); border-color: var(--hi); }
  .param-unit { color: var(--dim); font-size: 0.75em; min-width: 30px; }
  .param-info { display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }
  .param-short { color: var(--dim); font-size: 0.78em; line-height: 1.3; }
  .param-formula { color: var(--blue); font-size: 0.75em; font-family: monospace; }
  .param-expand { color: #666; font-size: 0.7em; cursor: pointer; user-select: none; padding: 0 4px; border-radius: 3px; }
  .param-expand:hover { color: var(--blue); background: rgba(255,255,255,0.05); }
  .param-detail { color: #999; font-size: 0.73em; line-height: 1.5; margin-top: 4px; padding: 6px 8px; background: rgba(0,0,0,0.2); border-radius: 5px; border-left: 2px solid #333; display: none; }
  .param-detail.open { display: block; }
  .changed .param-name { color: #ffcc00; }
  .dep-affected .param-name { color: #ff9f43 !important; transition: color 0.3s; }
  .dep-badge { display: inline-block; background: rgba(127,179,211,0.15); color: var(--blue); font-size: 0.68em; padding: 1px 5px; border-radius: 3px; margin-left: 4px; cursor: help; }
  .dep-section { margin-top: 4px; }
  .dep-section .dep-tag { display: inline-block; background: rgba(78,204,163,0.1); color: var(--green); font-size: 0.7em; padding: 1px 5px; border-radius: 3px; margin: 1px 2px; cursor: pointer; }
  .dep-section .dep-tag:hover { background: rgba(78,204,163,0.25); }
</style>
</head>
<body>

<h1>Kart Physics Tuner</h1>
<div class="status" id="status">Loading...</div>
<div class="toolbar">
  <button class="btn-save" onclick="save()">Save Now</button>
  <button class="btn-reset" onclick="loadParams()">Reload</button>
  <div class="autosave-toggle">
    <input type="checkbox" id="autosave" checked>
    <label for="autosave">Auto-save (0.5s hot-reload)</label>
  </div>
</div>
<div class="grid" id="groups"></div>

<script>
const PARAMS = {
  "Скорость (v2 force-based)": [
    { key: "MAX_SPEED", min: 5, max: 50, step: 0.5, unit: "m/s",
      short: "Референс скорости. НЕ hard clamp — реальная определяется через ACCEL_FORCE/K_DRAG",
      detail: "⚠️ В v2 это НЕ упор — машина разгоняется до равновесия thrust vs drag. Используется как референс для DRIFT_MIN_SPEED_RATIO и эффектов камеры. После тюнинга выставь сюда реальную макс скорость которую наблюдаешь в оверлее (fwd=...)." },
    { key: "ACCEL_FORCE", min: 10, max: 100, step: 2, unit: "m/s²",
      deps: ["K_DRAG", "K_ROLLING"],
      short: "Сила тяги при полном газе. Реальный top speed = равновесие с drag",
      detail: "📖 Force-based модель: accel = throttle × ACCEL_FORCE. Чем больше — тем быстрее ускоряется И тем выше терминалка.\n\nТерминальная скорость ≈ sqrt(ACCEL_FORCE / K_DRAG).\n\n🎮 Примеры (при K_DRAG=0.03):\n• 15 м/с² = top ~22 м/с — плавный разгон\n• 25 м/с² = top ~29 м/с — аркадный\n• 40 м/с² = top ~36 м/с — быстрая\n\n⚠️ Слишком высокое (>50) = моментальный разгон, пропадает ощущение веса." },
    { key: "K_DRAG", min: 0.01, max: 0.2, step: 0.005, unit: "",
      deps: ["ACCEL_FORCE"],
      short: "Квадратичное сопротивление (воздух). Доминирует на высокой скорости",
      detail: "📖 drag = K_DRAG × v² (против движения). Это основной ограничитель макс скорости.\n\n🎮 При ACCEL_FORCE=25:\n• K_DRAG=0.02: top ~35 м/с\n• K_DRAG=0.03: top ~29 м/с\n• K_DRAG=0.05: top ~22 м/с\n• K_DRAG=0.1:  top ~16 м/с — ощущение сильного сопротивления\n\n💡 Если разгон быстрый но макс низкая — повысь K_DRAG и ACCEL_FORCE вместе." },
    { key: "K_ROLLING", min: 0.1, max: 5, step: 0.1, unit: "",
      short: "Линейное сопротивление качения. Доминирует на малой скорости",
      detail: "📖 rolling = K_ROLLING × v (против движения). Делает так, чтобы машина не катилась вечно когда отпустил газ.\n\n🎮 Примеры:\n• 0.5: машина долго катится по инерции (как на льду)\n• 1.0: стандарт\n• 2.0: быстро тормозит без газа\n• 4.0: почти мгновенно встаёт когда отпустил W\n\n💡 Это 'трение качения' — эффект вязкий, не как BRAKE_FORCE (сухой stop)." },
    { key: "BRAKE_FORCE", min: 5, max: 60, step: 1, unit: "m/s²",
      short: "Доп сила торможения кнопкой S. В дополнение к drag+rolling",
      detail: "📖 При нажатии S: accel -= BRAKE_FORCE × direction. Это мгновенный тормоз поверх drag.\n\n🎮 При ACCEL=25, K_DRAG=0.03, K_ROLLING=1.2, MAX=~29 м/с:\n• 10: стоп с максималки ~2.5с — мягкий\n• 20: ~1.2с — стандарт\n• 40: ~0.6с — резкий\n• 60: ~0.4с — блокировка колёс\n\n⚠️ Слишком высокое = машина 'втыкается'." },
    { key: "REVERSE_RATIO", min: 0.2, max: 0.8, step: 0.05, unit: "x",
      deps: ["ACCEL_FORCE"],
      short: "Доля ACCEL_FORCE при заднем ходе. 0.5 = задний ход вдвое слабее",
      detail: "📖 Реверс = ACCEL_FORCE × REVERSE_RATIO. Emergent reverse top speed = sqrt(ACCEL × RATIO / K_DRAG).\n\n🎮 При ACCEL=25, K_DRAG=0.03:\n• 0.3: reverse top ~16 м/с\n• 0.5: reverse top ~20 м/с\n• 0.7: reverse top ~24 м/с\n\n💡 Типично 0.4-0.6 — чтоб реверс был медленнее прямого хода." },
  ],
  "Сглаживание ввода": [
    { key: "STEER_SLEW_IN", min: 1, max: 20, step: 0.5, unit: "/s",
      short: "Как быстро руль доходит до упора. Больше = отзывчивее",
      deps: ["DRIFT_ENTER_THRESHOLD"],
      detail: "📖 Клавиатура даёт 0 или 1 мгновенно. Этот параметр делает переход плавным: steer_input растёт на SLEW_IN/сек.\n\n🎮 Примеры:\n• 2: полный поворот за 0.5с (до дрифт-порога 0.75 → 0.38с)\n• 5: 0.2с до полного\n• 10: 0.1с — почти мгновенно\n\n⚡ Влияет на время входа в дрифт: надо достичь DRIFT_ENTER_THRESHOLD (0.75)." },
    { key: "STEER_SLEW_OUT", min: 1, max: 15, step: 0.5, unit: "/s",
      short: "Как быстро руль возвращается в центр. Критично для выхода из дрифта",
      deps: ["DRIFT_EXIT_THRESHOLD"],
      detail: "📖 При отпускании A/D руль плавно возвращается к нулю. Дрифт выходит когда |steer| < DRIFT_EXIT_THRESHOLD (0.35).\n\n🎮 При OUT=2.5, ENTER=0.75, EXIT=0.35:\n• Падение 0.75 → 0.35 занимает 0.16с — после этого _is_drifting=false\n• Падение 0.75 → 0 занимает 0.3с\n\n💡 Выше = быстрее выход из дрифта. Ниже = машина 'доруливает' после отпускания." },
    { key: "THROTTLE_SLEW", min: 1, max: 20, step: 0.5, unit: "/s",
      short: "Как быстро газ доходит до максимума. Меньше = мягче педаль",
      detail: "📖 Работает как STEER_SLEW но для газа/тормоза.\n\n🎮 Примеры:\n• 2: полный газ за 0.5с — ощущение 'педали'\n• 5: 0.2с — средне\n• 10: 0.1с — тумблер вкл/выкл" },
  ],
  "Рулёжка": [
    { key: "STEERING_SPEED", min: 0.5, max: 5, step: 0.1, unit: "rad/s",
      short: "Базовая скорость поворота (direct rotation). Умножается на множители",
      detail: "📖 v2: direct rotation через rotate_y(). Итог: yaw_rate = STEERING_SPEED × speed_scale × steer_mult × drift_mult × steer_input.\n\n🎮 При 2.8 и множителях 1.4/0.85: на малой скорости ~3.92 рад/с, на максималке ~2.38 рад/с." },
    { key: "STEER_LOW_MULT", min: 0.5, max: 3, step: 0.05, unit: "x",
      deps: ["STEERING_SPEED", "STEER_HIGH_MULT"],
      short: "Множитель поворота на малой скорости (v≈0)",
      detail: "📖 Интерполяция: на v=0 → LOW_MULT, на v=MAX_SPEED → HIGH_MULT.\n\n🎮 Обычно LOW > HIGH чтобы маневрировать медленно. При LOW=1.4, HIGH=0.85: парковка резкая, на шоссе плавная." },
    { key: "STEER_HIGH_MULT", min: 0.1, max: 1.5, step: 0.05, unit: "x",
      deps: ["STEERING_SPEED", "STEER_LOW_MULT"],
      short: "Множитель поворота на макс скорости. Меньше = шире дуги",
      detail: "📖 Обычно <1.0 чтоб на скорости машина не крутилась волчком." },
    { key: "STEER_SPEED_THRESHOLD", min: 0.5, max: 10, step: 0.5, unit: "m/s",
      deps: ["STATIONARY_STEER_THRESHOLD"],
      short: "Скорость при которой speed_scale=1.0. Используется выше STATIONARY_THRESHOLD",
      detail: "📖 speed_scale = clamp(speed/threshold, 0..1). При 3 м/с: на v=1.5 руль на 50%, на 3+ на 100%.\n\n💡 Это плавная нарастающая чувствительность руля с разгоном." },
    { key: "STATIONARY_STEER_THRESHOLD", min: 0.5, max: 5, step: 0.25, unit: "m/s",
      short: "Ниже этой скорости — хак: руль работает по STATIONARY_SCALE",
      detail: "📖 Аркадный фикс: без этого карт не поворачивается стоя (speed_scale ~ 0).\n\n🎮 При 2 м/с: ниже — фиксированный yaw_rate × STATIONARY_SCALE, выше — нормальный speed_scale." },
    { key: "STATIONARY_STEER_SCALE", min: 0.1, max: 1.0, step: 0.05, unit: "x",
      deps: ["STATIONARY_STEER_THRESHOLD"],
      short: "Доля yaw_rate при стоянке. 0.4 = 40% полного поворота на месте",
      detail: "📖 Когда speed < STATIONARY_STEER_THRESHOLD карт поворачивается на этот множитель от полного yaw_rate.\n\n🎮 Примеры:\n• 0.2: еле крутится на месте\n• 0.4: стандарт — визуально отзывчиво без spin-in-place\n• 0.8: почти полный поворот — карт крутится волчком стоя" },
    { key: "WHEEL_RADIUS", min: 0.05, max: 0.5, step: 0.01, unit: "m",
      short: "Радиус колеса для анимации вращения (визуал only)",
      detail: "Только визуальная скорость вращения колёс. Меньше = крутятся быстрее." },
  ],
  "Дрифт (binary v2)": [
    { key: "HIGH_GRIP", min: 5, max: 30, step: 0.5, unit: "",
      short: "Сцепление вне дрифта. Больше = 'рельсовее'",
      deps: ["GRIP_LOSS_RATE", "LOW_GRIP"],
      detail: "📖 Это grip когда _is_drifting=false. Формула: side_speed *= exp(-grip × dt).\n\n🎮 Примеры:\n• 10: за 0.1с гасит 63% бокового\n• 18: 83%\n• 25: 92% — очень липкая\n\n⚠️ Если слишком низкое (5-6) — карт плохо держит дорогу даже без дрифта." },
    { key: "LOW_GRIP", min: 0.1, max: 3, step: 0.1, unit: "",
      short: "Сцепление ВО ВРЕМЯ дрифта. Меньше = длиннее занос",
      deps: ["GRIP_RECOVERY_RATE", "HIGH_GRIP"],
      detail: "📖 Это grip когда _is_drifting=true. Разница HIGH-LOW = ощущаемая глубина дрифта.\n\n🎮 Примеры:\n• 0.3: вечный занос, машина плывёт\n• 0.8: стандарт, half-life 0.87с\n• 1.5: короткий контролируемый\n• 3.0: почти нет заноса\n\n💡 LOW=0.5 с HIGH=6 = слабая разница, дрифт почти не ощущается." },
    { key: "GRIP_LOSS_RATE", min: 1, max: 30, step: 0.5, unit: "/s",
      short: "Скорость падения grip при ВХОДЕ в дрифт (v2: менее критично)",
      deps: ["HIGH_GRIP", "LOW_GRIP"],
      detail: "📖 В v2 binary drift переход HIGH→LOW когда _is_drifting=true. Этот rate — скорость интерполяции.\n\n🎮 При HIGH=18, LOW=0.8:\n• 5: 3.4с — очень плавно\n• 12: 1.4с\n• 20: 0.86с — резкий вход" },
    { key: "GRIP_RECOVERY_RATE", min: 0.5, max: 20, step: 0.5, unit: "/s",
      short: "Скорость восстановления grip при ВЫХОДЕ. Критично для SmashKarts-стиля!",
      deps: ["HIGH_GRIP", "LOW_GRIP"],
      detail: "📖 Когда _is_drifting=false grip возвращается LOW→HIGH. Для SmashKarts эффекта (мгновенно прямо) — высокое значение.\n\n🎮 При HIGH=18, LOW=0.8:\n• 3: 5.7с — 'машина плывёт' после дрифта\n• 10: 1.7с — заметный хвост\n• 20: 0.86с — быстрая стабилизация (SmashKarts feel)\n\n⚠️ Если хочешь SmashKarts-стиль — ставь 15-25." },
    { key: "DRIFT_ENTER_THRESHOLD", min: 0.5, max: 0.95, step: 0.05, unit: "",
      deps: ["DRIFT_EXIT_THRESHOLD"],
      short: "|steer_input| выше этого → ВХОД в дрифт (мгновенно)",
      detail: "📖 Инвариант: ENTER > EXIT. Разрыв создаёт гистерезис — дрифт не моргает на границе.\n\n🎮 Примеры:\n• 0.75: дрифт при близком-к-полному рулю — стандарт\n• 0.6: дрифт входит легко\n• 0.9: дрифт требует очень сильного руля\n\n💡 Также нужна скорость > MAX_SPEED × DRIFT_MIN_SPEED_RATIO." },
    { key: "DRIFT_EXIT_THRESHOLD", min: 0.1, max: 0.7, step: 0.05, unit: "",
      deps: ["DRIFT_ENTER_THRESHOLD"],
      short: "|steer_input| ниже этого → ВЫХОД из дрифта",
      detail: "📖 Hysteresis: пока steer_input в зоне [EXIT, ENTER], состояние дрифта сохраняется.\n\n🎮 При ENTER=0.75, EXIT=0.35:\n• Отпустил руль → steer падает → проходит 0.35 → мгновенно _is_drifting=false\n• С STEER_SLEW_OUT=2.5: 0.75→0.35 за 0.16с\n\n⚠️ EXIT должен быть МЕНЬШЕ ENTER." },
    { key: "DRIFT_MIN_SPEED_RATIO", min: 0.1, max: 0.8, step: 0.05, unit: "x",
      deps: ["MAX_SPEED"],
      short: "Доля MAX_SPEED — мин скорость для дрифта. 0.4 = 40%",
      detail: "📖 Дрифт невозможен ниже MAX_SPEED × RATIO. Exit (speed < RATIO × 0.8) тоже через гистерезис.\n\n🎮 При MAX_SPEED=29:\n• 0.2 → мин 5.8 м/с — дрифт почти всегда\n• 0.4 → мин 11.6 м/с — только на разгоне\n• 0.6 → мин 17.4 м/с — только на высокой скорости" },
    { key: "DRIFT_YAW_MULTIPLIER", min: 1.0, max: 3.0, step: 0.1, unit: "x",
      short: "Множитель yaw rate ВО ВРЕМЯ дрифта. SmashKarts feel — тугая дуга",
      detail: "📖 Когда _is_drifting=true: yaw_rate *= MULTIPLIER. Это ОСНОВА feel'a дрифта (не боковое скольжение).\n\n🎮 Примеры:\n• 1.0: нет эффекта — дрифт только через LOW_GRIP\n• 1.5: +50% — стандарт\n• 1.7: +70% — SmashKarts\n• 2.2: +120% — экстрим, может быть нестабильно\n\n💡 Основной регулятор 'радиуса дрифт-дуги'." },
    { key: "DRIFT_KICK_FORCE", min: 0, max: 15, step: 0.5, unit: "m/s",
      short: "Боковой импульс при ВХОДЕ в дрифт. Задний занос",
      detail: "📖 One-shot удар по velocity.x basis при transition false→true. Создаёт 'щелчок' зада.\n\n🎮 Примеры:\n• 0: нет kick'а — только yaw multiplier\n• 4: субтильный — зад чуть заносит\n• 8: заметный\n• 12: драматичный щелчок зада\n\n⚠️ Слишком высокий = машину швыряет боком." },
    { key: "DRIFT_DRAG_MULTIPLIER", min: 1.0, max: 3.0, step: 0.05, unit: "x",
      deps: ["K_DRAG", "ACCEL_FORCE"],
      short: "Множитель K_DRAG во время дрифта. Снижает terminal velocity в повороте",
      detail: "📖 В дрифте: effective_k_drag = K_DRAG × DRIFT_DRAG_MULTIPLIER. Снижает терминальную скорость: v_drift = sqrt(ACCEL_FORCE / (K_DRAG × mult)).\n\n🎮 Примеры (ACCEL=28, K_DRAG=0.03, normal terminal ≈ 30.5 м/с):\n• 1.0: нет эффекта — старое поведение v2\n• 1.5: terminal в дрифте ≈ 24.9 м/с (81.6%)\n• 1.8: terminal ≈ 22.8 м/с (74.7%) — стандарт\n• 2.5: terminal ≈ 19.3 м/с (63%)\n\n⚠️ Слишком высокое (>2.5) = карт тормозит в каждом повороте." },
    { key: "DRIFT_ROLLING_MULTIPLIER", min: 1.0, max: 2.0, step: 0.05, unit: "x",
      deps: ["K_ROLLING"],
      short: "Множитель K_ROLLING во время дрифта. Тактильный scrubbing при входе/выходе",
      detail: "📖 В дрифте: effective_k_rolling = K_ROLLING × DRIFT_ROLLING_MULTIPLIER. Влияет только на малых скоростях (rolling negligible at high speed) — создаёт scrubbing ощущение на переходах.\n\n🎮 Примеры (K_ROLLING=1.5):\n• 1.0: нет эффекта\n• 1.3: +30% rolling — стандарт, тактильно на входе\n• 1.7: заметное торможение при низкоскоростном дрифте\n• 2.0: резкий стоп ощущается на выходе\n\n💡 Не меняет terminal velocity (rolling ≪ drag на высокой скорости)." },
    { key: "VFX_SMOKE_THRESHOLD", min: 0.5, max: 10, step: 0.5, unit: "m/s",

const safeNum = (v, fb = 0) => (typeof v === "number" && isFinite(v)) ? v : fb;
const fmt = (v, d = 1) => isFinite(v) ? v.toFixed(d) : "—";

const FORMULAS = {
  "MAX_SPEED": p => `${fmt(safeNum(p.MAX_SPEED) * 3.6, 0)} km/h (референс)`,
  "ACCEL_FORCE": p => {
    const a = safeNum(p.ACCEL_FORCE);
    const d = safeNum(p.K_DRAG);
    const term = d > 0 ? Math.sqrt(a / d) : NaN;
    return `Терминалка ≈ ${fmt(term, 1)} m/s (${fmt(term * 3.6, 0)} km/h)`;
  },
  "K_DRAG": p => {
    const a = safeNum(p.ACCEL_FORCE);
    const d = safeNum(p.K_DRAG);
    const term = d > 0 ? Math.sqrt(a / d) : NaN;
    return `Терминалка ≈ ${fmt(term, 1)} m/s`;
  },
  "K_ROLLING": p => `Drag@5m/s: ${fmt(safeNum(p.K_ROLLING) * 5, 1)} m/s² │ @15m/s: ${fmt(safeNum(p.K_ROLLING) * 15, 1)}`,
  "BRAKE_FORCE": p => {
    const maxV = safeNum(p.MAX_SPEED);
    const total = safeNum(p.BRAKE_FORCE) + safeNum(p.K_ROLLING) * maxV + safeNum(p.K_DRAG) * maxV * maxV;
    return `Стоп с max (~${fmt(maxV, 0)} m/s): ~${fmt(maxV / total, 2)}s`;
  },
  "REVERSE_RATIO": p => {
    const term = safeNum(p.K_DRAG) > 0 ? Math.sqrt(safeNum(p.ACCEL_FORCE) * safeNum(p.REVERSE_RATIO) / safeNum(p.K_DRAG)) : NaN;
    return `Reverse top: ${fmt(term, 1)} m/s`;
  },
  "STEER_SLEW_IN": p => {
    const s = safeNum(p.STEER_SLEW_IN);
    const enter = safeNum(p.DRIFT_ENTER_THRESHOLD, 0.75);
    return `Полный: ${fmt(s > 0 ? 1 / s : 0, 2)}s │ До дрифта: ${fmt(s > 0 ? enter / s : 0, 2)}s`;
  },
  "STEER_SLEW_OUT": p => {
    const s = safeNum(p.STEER_SLEW_OUT);
    const gap = safeNum(p.DRIFT_ENTER_THRESHOLD, 0.75) - safeNum(p.DRIFT_EXIT_THRESHOLD, 0.35);
    return `Центр за ${fmt(s > 0 ? 1 / s : 0, 2)}s │ Выход: ${fmt(s > 0 ? gap / s : 0, 2)}s`;
  },
  "THROTTLE_SLEW": p => `Полный газ за ${fmt(safeNum(p.THROTTLE_SLEW) > 0 ? 1 / p.THROTTLE_SLEW : 0, 2)}s`,
  "STEERING_SPEED": p => `Тихо: ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STEER_LOW_MULT))} │ Макс: ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STEER_HIGH_MULT))} rad/s`,
  "STEER_LOW_MULT": p => `= ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STEER_LOW_MULT))} rad/s на v≈0`,
  "STEER_HIGH_MULT": p => `= ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STEER_HIGH_MULT))} rad/s на max`,
  "STEER_SPEED_THRESHOLD": p => `Полный руль от ${fmt(safeNum(p.STEER_SPEED_THRESHOLD))} m/s`,
  "STATIONARY_STEER_THRESHOLD": p => `Хак активен при v < ${fmt(safeNum(p.STATIONARY_STEER_THRESHOLD))} m/s`,
  "STATIONARY_STEER_SCALE": p => `Yaw стоя: ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STATIONARY_STEER_SCALE))} rad/s (${fmt(safeNum(p.STATIONARY_STEER_SCALE) * 100, 0)}% полного)`,
  "WHEEL_RADIUS": p => {
    const r = safeNum(p.WHEEL_RADIUS);
    return r > 0 ? `${fmt(safeNum(p.MAX_SPEED) / r / (2 * Math.PI), 0)} об/с на макс` : "—";
  },
  "HIGH_GRIP": p => `За 0.1с гасит ${fmt((1 - Math.exp(-safeNum(p.HIGH_GRIP) * 0.1)) * 100, 0)}% бокового`,
  "LOW_GRIP": p => {
    const g = safeNum(p.LOW_GRIP);
    return `Half-life: ${fmt(g > 0 ? Math.LN2 / g : 0, 2)}s │ 1с: -${fmt((1 - Math.exp(-g)) * 100, 0)}%`;
  },
  "GRIP_LOSS_RATE": p => {
    const delta = safeNum(p.HIGH_GRIP) - safeNum(p.LOW_GRIP);
    const r = safeNum(p.GRIP_LOSS_RATE);
    return `HIGH→LOW: ${fmt(r > 0 ? delta / r : 0, 2)}s`;
  },
  "GRIP_RECOVERY_RATE": p => {
    const delta = safeNum(p.HIGH_GRIP) - safeNum(p.LOW_GRIP);
    const r = safeNum(p.GRIP_RECOVERY_RATE);
    return `LOW→HIGH: ${fmt(r > 0 ? delta / r : 0, 2)}s`;
  },
  "DRIFT_ENTER_THRESHOLD": p => {
    const slew = safeNum(p.STEER_SLEW_IN);
    const t = safeNum(p.DRIFT_ENTER_THRESHOLD);
    return `Время до порога: ${fmt(slew > 0 ? (t / slew) * 1000 : 0, 0)}ms`;
  },
  "DRIFT_EXIT_THRESHOLD": p => {
    const enter = safeNum(p.DRIFT_ENTER_THRESHOLD);
    const exit = safeNum(p.DRIFT_EXIT_THRESHOLD);
    const ok = exit < enter;
    return `Гистерезис: ${fmt(enter - exit, 2)} ${ok ? "✓" : "⚠️ EXIT >= ENTER!"}`;
  },
  "DRIFT_MIN_SPEED_RATIO": p => `Мин скорость: ${fmt(safeNum(p.MAX_SPEED) * safeNum(p.DRIFT_MIN_SPEED_RATIO))} m/s`,
  "DRIFT_YAW_MULTIPLIER": p => `В дрифте: +${fmt((safeNum(p.DRIFT_YAW_MULTIPLIER) - 1) * 100, 0)}% поворота`,
  "DRIFT_KICK_FORCE": p => `One-shot +${fmt(safeNum(p.DRIFT_KICK_FORCE))} m/s бокового`,
  "DRIFT_DRAG_MULTIPLIER": p => {
    const a = safeNum(p.ACCEL_FORCE); const kd = safeNum(p.K_DRAG); const m = safeNum(p.DRIFT_DRAG_MULTIPLIER, 1);
    const vn = kd > 0 ? Math.sqrt(a / kd) : 0;
    const vd = (kd * m) > 0 ? Math.sqrt(a / (kd * m)) : 0;
    return `Terminal drift: ${fmt(vd)} m/s (${fmt(vn > 0 ? vd / vn * 100 : 0, 0)}% от нормального)`;
  },
  "DRIFT_ROLLING_MULTIPLIER": p => {
    const kr = safeNum(p.K_ROLLING); const m = safeNum(p.DRIFT_ROLLING_MULTIPLIER, 1);
    return `Effective rolling в дрифте: ${fmt(kr * m, 2)} (×${fmt(m, 2)})`;
  },
  "VFX_SMOKE_THRESHOLD": p => `Дым от ${fmt(safeNum(p.VFX_SMOKE_THRESHOLD))} m/s бокового`,
  "VISUAL_DRIFT_MAX_DEG": p => `Наклон в дрифте: ±${fmt(safeNum(p.VISUAL_DRIFT_MAX_DEG), 0)}°`,
  "DEBUG_VECTORS": p => `${safeNum(p.DEBUG_VECTORS) > 0 ? "ВКЛ ✓" : "выкл"}`,
  "GRAVITY": p => `${fmt(safeNum(p.GRAVITY) / 9.8, 1)}× Земля │ 3м: ${fmt(Math.sqrt(6 / safeNum(p.GRAVITY, 1)), 2)}s`,
  "SLOPE_INFLUENCE": p => `30°: ±${fmt(0.5 * safeNum(p.SLOPE_INFLUENCE))} m/s²`,
  "ROCKET_SPEED": p => {
    const mx = safeNum(p.MAX_SPEED);
    return `${fmt(mx > 0 ? safeNum(p.ROCKET_SPEED) / mx : 0, 1)}× карта │ ${fmt(safeNum(p.ROCKET_SPEED) * 3.6, 0)} km/h`;
  },
  "ROCKET_LIFETIME": p => `Дальность: ${fmt(safeNum(p.ROCKET_SPEED) * safeNum(p.ROCKET_LIFETIME), 0)}м`,
  "DAMAGE": p => {
    const d = safeNum(p.DAMAGE);
    return d > 0 ? `${Math.ceil(100 / d)} попаданий = смерть` : "—";
  },
  "CAMERA_HEIGHT": p => {
    const d = safeNum(p.CAMERA_DISTANCE);
    return `Угол: ${d > 0 ? fmt(Math.atan(safeNum(p.CAMERA_HEIGHT) / d) * 180 / Math.PI, 0) : "—"}°`;
  },
  "FOV_SPEED_BOOST": p => `На макс: ${fmt(safeNum(p.FOV) + safeNum(p.FOV_SPEED_BOOST), 0)}°`,
};

// Whitelist of keys that tuner is allowed to write. Prevents zombie keys from
// pre-v2 params getting resurrected when the file is saved.
const ALLOWED_KEYS = new Set();
for (const group of Object.values(PARAMS)) {
  for (const p of group) ALLOWED_KEYS.add(p.key);
}

let currentData = {};
let originalData = {};
let saveTimeout = null;

async function loadParams() {
  try {
    const r = await fetch("/params");
    currentData = await r.json();
    originalData = JSON.parse(JSON.stringify(currentData));
    render();
    setStatus("Loaded", "");
  } catch(e) {
    setStatus("Error loading: " + e.message, "error");
  }
}

function setStatus(text, cls) {
  const el = document.getElementById("status");
  el.textContent = text;
  el.className = "status " + (cls || "");
}

function render() {
  const container = document.getElementById("groups");
  container.innerHTML = "";

  for (const [groupName, params] of Object.entries(PARAMS)) {
    const group = document.createElement("div");
    group.className = "group";
    group.innerHTML = `<h2>${groupName}</h2>`;

    for (const p of params) {
      const val = currentData[p.key] ?? 0;
      const changed = val !== originalData[p.key];
      const div = document.createElement("div");
      div.className = "param" + (changed ? " changed" : "");
      div.id = "param-" + p.key;

      const formula = FORMULAS[p.key] ? FORMULAS[p.key](currentData) : "";
      const hasDetail = p.detail && p.detail.length > 0;

      const depsHtml = (p.deps && p.deps.length) ?
        `<div class="dep-section">↔ ${p.deps.map(d => `<span class="dep-tag" onclick="scrollToParam('${d}')" title="Зависимый параметр">${d}</span>`).join(" ")}</div>` : "";
      // Build reverse deps display
      const affectedBy = [];
      for (const [gn, gp] of Object.entries(PARAMS)) {
        for (const op of gp) {
          if (op.deps && op.deps.includes(p.key)) affectedBy.push(op.key);
        }
      }
      const affectedHtml = affectedBy.length ?
        `<span class="dep-badge" title="Влияет на: ${affectedBy.join(', ')}">↑ ${affectedBy.length}</span>` : "";

      div.innerHTML = `
        <div class="param-row">
          <span class="param-name">${p.key}</span>${affectedHtml}
          <input type="range" class="param-slider" id="slider-${p.key}" min="${p.min}" max="${p.max}" step="${p.step}" value="${val}">
          <input type="number" class="param-num" id="num-${p.key}" min="${p.min}" max="${p.max}" step="${p.step}" value="${val}">
          <span class="param-unit">${p.unit}</span>
        </div>
        <div class="param-info">
          <span class="param-short">${p.short}</span>
          ${formula ? `<span class="param-formula">${formula}</span>` : ""}
          ${hasDetail ? `<span class="param-expand" onclick="this.parentElement.nextElementSibling.classList.toggle('open')">\u25BC</span>` : ""}
        </div>
        ${hasDetail ? `<div class="param-detail">${p.detail.replace(/\\n/g, '<br>')}</div>` : ""}
        ${depsHtml}
      `;
      group.appendChild(div);

      setTimeout(() => {
        const slider = document.getElementById("slider-" + p.key);
        const num = document.getElementById("num-" + p.key);
        if (!slider || !num) return;

        const update = (v) => {
          const val = parseFloat(v);
          if (isNaN(val)) return; // guard: empty field or invalid input
          currentData[p.key] = val;
          slider.value = val;
          num.value = val;
          const wrap = document.getElementById("param-" + p.key);
          if (val !== originalData[p.key]) wrap.classList.add("changed");
          else wrap.classList.remove("changed");
          updateFormulas();
          highlightDeps(p.key);
          autoSave();
        };
        slider.addEventListener("input", e => update(e.target.value));
        num.addEventListener("input", e => update(e.target.value));
      }, 0);
    }
    container.appendChild(group);
  }
}

function updateFormulas() {
  for (const [groupName, params] of Object.entries(PARAMS)) {
    for (const p of params) {
      const fn = FORMULAS[p.key];
      if (!fn) continue;
      const el = document.getElementById("param-" + p.key);
      if (!el) continue;
      const formulaSpan = el.querySelector(".param-formula");
      try {
        const text = fn(currentData);
        if (formulaSpan) formulaSpan.textContent = text;
      } catch(e) {}
    }
  }
}

function autoSave() {
  if (!document.getElementById("autosave").checked) return;
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(save, 300);
}

async function save() {
  clearTimeout(saveTimeout);
  try {
    const full = {};
    // Only write keys that are: (a) underscore comments/sections, or (b) in our allowed list.
    // Unknown keys get dropped — prevents pre-v2 zombies from being resurrected.
    for (const [k, v] of Object.entries(currentData)) {
      if (k.startsWith("_") || ALLOWED_KEYS.has(k)) full[k] = v;
    }
    for (const [k, v] of Object.entries(originalData)) {
      if (k.startsWith("_") && !(k in full)) full[k] = v;
    }

    const r = await fetch("/params", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(full, null, 2),
    });
    if (r.ok) {
      setStatus("Saved! Hot-reload ~0.5s", "saved");
      setTimeout(() => setStatus("", ""), 2000);
    } else {
      setStatus("Save error: " + r.status, "error");
    }
  } catch(e) {
    setStatus("Save error: " + e.message, "error");
  }
}

function scrollToParam(key) {
  const el = document.getElementById("param-" + key);
  if (!el) return;
  el.scrollIntoView({ behavior: "smooth", block: "center" });
  el.classList.add("dep-affected");
  setTimeout(() => el.classList.remove("dep-affected"), 2000);
}

// Highlight dependent params when a value changes
function highlightDeps(key) {
  // Find params that list this key in their deps
  for (const [gn, gp] of Object.entries(PARAMS)) {
    for (const p of gp) {
      if (p.deps && p.deps.includes(key)) {
        const el = document.getElementById("param-" + p.key);
        if (el) {
          el.classList.add("dep-affected");
          setTimeout(() => el.classList.remove("dep-affected"), 1500);
        }
      }
    }
  }
  // Also highlight params that this key depends on
  for (const [gn, gp] of Object.entries(PARAMS)) {
    for (const p of gp) {
      if (p.key === key && p.deps) {
        for (const d of p.deps) {
          const el = document.getElementById("param-" + d);
          if (el) {
            el.classList.add("dep-affected");
            setTimeout(() => el.classList.remove("dep-affected"), 1500);
          }
        }
      }
    }
  }
}

loadParams();
