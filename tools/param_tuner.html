<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Kart Physics Tuner</title>
<style>
  :root { --bg: #1a1a2e; --card: #16213e; --accent: #0f3460; --hi: #e94560; --text: #eee; --dim: #888; --green: #4ecca3; --blue: #7fb3d3; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 16px; }
  h1 { text-align: center; margin-bottom: 6px; font-size: 1.4em; }
  .status { text-align: center; margin-bottom: 12px; color: var(--dim); font-size: 0.85em; min-height: 1.2em; }
  .status.saved { color: var(--green); }
  .status.error { color: var(--hi); }
  .toolbar { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .autosave-toggle { display: flex; align-items: center; gap: 6px; font-size: 0.85em; color: var(--dim); }
  .autosave-toggle input { accent-color: var(--hi); }
  button { padding: 7px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85em; font-weight: 600; transition: all 0.15s; }
  .btn-save { background: var(--hi); color: white; }
  .btn-save:hover { background: #ff6b81; }
  .btn-reset { background: var(--accent); color: var(--text); }
  .btn-reset:hover { background: #1a4a80; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 1400px; margin: 0 auto; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  .group { background: var(--card); border-radius: 10px; padding: 14px 16px; }
  .group h2 { color: var(--hi); font-size: 0.95em; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 6px; }
  .param { margin-bottom: 12px; }
  .param:last-child { margin-bottom: 0; }
  .param-row { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .param-name { font-weight: 700; font-size: 0.82em; color: var(--green); font-family: monospace; min-width: 0; white-space: nowrap; }
  .param-slider { flex: 1; accent-color: var(--hi); height: 5px; min-width: 60px; }
  .param-num { width: 68px; background: var(--accent); border: 1px solid #444; color: var(--text); padding: 3px 6px; border-radius: 5px; font-size: 0.85em; text-align: center; }
  .param-num:focus { outline: 1px solid var(--hi); border-color: var(--hi); }
  .param-unit { color: var(--dim); font-size: 0.75em; min-width: 30px; }
  .param-info { display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }
  .param-short { color: var(--dim); font-size: 0.78em; line-height: 1.3; }
  .param-formula { color: var(--blue); font-size: 0.75em; font-family: monospace; }
  .param-expand { color: #666; font-size: 0.7em; cursor: pointer; user-select: none; padding: 0 4px; border-radius: 3px; }
  .param-expand:hover { color: var(--blue); background: rgba(255,255,255,0.05); }
  .param-detail { color: #999; font-size: 0.73em; line-height: 1.5; margin-top: 4px; padding: 6px 8px; background: rgba(0,0,0,0.2); border-radius: 5px; border-left: 2px solid #333; display: none; }
  .param-detail.open { display: block; }
  .changed .param-name { color: #ffcc00; }
  .dep-affected .param-name { color: #ff9f43 !important; transition: color 0.3s; }
  .dep-badge { display: inline-block; background: rgba(127,179,211,0.15); color: var(--blue); font-size: 0.68em; padding: 1px 5px; border-radius: 3px; margin-left: 4px; cursor: help; }
  .dep-section { margin-top: 4px; }
  .dep-section .dep-tag { display: inline-block; background: rgba(78,204,163,0.1); color: var(--green); font-size: 0.7em; padding: 1px 5px; border-radius: 3px; margin: 1px 2px; cursor: pointer; }
  .dep-section .dep-tag:hover { background: rgba(78,204,163,0.25); }
</style>
</head>
<body>

<h1>Kart Physics Tuner</h1>
<div class="status" id="status">Loading...</div>
<div class="toolbar">
  <button class="btn-save" onclick="save()">Save Now</button>
  <button class="btn-reset" onclick="loadParams()">Reload</button>
  <div class="autosave-toggle">
    <input type="checkbox" id="autosave" checked>
    <label for="autosave">Auto-save (0.5s hot-reload)</label>
  </div>
</div>
<div class="grid" id="groups"></div>

<script>
const PARAMS = {
  "Скорость": [
    { key: "MAX_SPEED", min: 5, max: 50, step: 0.5, unit: "m/s",
      short: "Условная макс скорость — используется для расчёта дрифта и камеры. НЕ ограничивает реальную скорость",
      detail: "Это просто число-ориентир, а не настоящий потолок. Настоящую максималку задают ACCEL_FORCE и K_DRAG вместе.\n\nЧто от неё зависит: когда включается эффект скорости на камере (FOV), порог минимальной скорости для дрифта.\n\nПосле тюнинга посмотри реальную макс скорость в оверлее сверху слева (speed=...) и впиши сюда примерно то же значение." },
    { key: "ACCEL_FORCE", min: 10, max: 100, step: 2, unit: "m/s²",
      deps: ["K_DRAG", "K_ROLLING"],
      short: "Сила мотора. Насколько резво машина разгоняется и как высоко её можно разогнать",
      detail: "Чем больше — тем быстрее разгон и выше максималка.\n\nОриентиры:\n• Низкое (15-20): машина ощущается тяжёлой, разгон ленивый\n• Среднее (25-35): аркадный стандарт\n• Высокое (50+): моментальный разгон, пропадает ощущение веса\n\nЕсли хочешь чтоб разгон ощущался весомо — лучше оставь умеренное ACCEL_FORCE и настраивай K_DRAG." },
    { key: "K_DRAG", min: 0.01, max: 0.2, step: 0.005, unit: "",
      deps: ["ACCEL_FORCE"],
      short: "Сопротивление воздуха. Главный ограничитель максималки — чем больше, тем ниже потолок скорости",
      detail: "Работает сильнее на высокой скорости (когда машина уже разогналась). На малых скоростях почти не заметно.\n\nЕсли машина слишком быстрая → увеличь.\nЕсли разгон упирается в слишком низкий потолок → уменьши, или одновременно подними ACCEL_FORCE.\n\nОриентиры при ACCEL=25: K_DRAG=0.02 → макс ~35 м/с, 0.05 → ~22 м/с, 0.1 → ~16 м/с (ощущение густого воздуха)." },
    { key: "K_ROLLING", min: 0.1, max: 5, step: 0.1, unit: "",
      short: "Трение качения. Насколько машина замедляется когда ты отпустил газ (по инерции)",
      detail: "Работает всегда — даже когда не жмёшь тормоз. Отвечает за естественное торможение на выкате.\n\nОриентиры:\n• 0.5: машина долго катится по инерции (как на льду)\n• 1.0-1.5: стандарт\n• 2.5: быстро встаёт без газа\n• 4.0: почти сразу тормозит когда отпустил W\n\nВ отличие от тормоза S это плавное 'подтормаживание', а не резкий стоп." },
    { key: "BRAKE_FORCE", min: 5, max: 60, step: 1, unit: "m/s²",
      short: "Сила торможения кнопкой S. Насколько быстро останавливаешься при активном тормозе",
      detail: "Работает только когда жмёшь S и едешь вперёд.\n\nОриентиры:\n• 10-15: мягкий тормоз, остановка с максималки ~2-3 сек\n• 20-30: стандарт, ~1-1.5 сек\n• 40-50: резкий, ~0.5-1 сек\n• 60: машина 'втыкается' как в стену\n\nЕсли тормоза слишком 'ватные' → увеличь. Если хочешь плавнее останавливаться — уменьши." },
    { key: "REVERSE_RATIO", min: 0.2, max: 0.8, step: 0.05, unit: "x",
      deps: ["ACCEL_FORCE"],
      short: "Сила заднего хода относительно переднего. 0.5 = задний ход вдвое слабее",
      detail: "Задний ход не такой быстрый как передний — это стандарт.\n\nОриентиры:\n• 0.3: еле ползёт назад, только для парковки\n• 0.5: удобно манёврить задним, но не гонка\n• 0.7: задний ход почти такой же быстрый как передний" },
  ],
  "Сглаживание ввода": [
    { key: "STEER_SLEW_IN", min: 1, max: 20, step: 0.5, unit: "/s",
      short: "Как быстро руль прокручивается до упора когда жмёшь A/D. Больше = отзывчивее",
      detail: "Клавиатура даёт 'вкл/выкл' мгновенно, а физике нужна плавность. Этот параметр делает нажатие плавным.\n\nОриентиры:\n• 2: полный поворот за 0.5 сек — руль 'тяжёлый'\n• 5: 0.2 сек — отзывчиво\n• 10+: почти мгновенно — как тумблер\n\nВ v2.3 дрифт нет бинарных порогов — intensity_target = pow(|steer|, exponent). Скорость руля влияет на то как быстро intensity нарастает." },
    { key: "STEER_SLEW_OUT", min: 1, max: 15, step: 0.5, unit: "/s",
      short: "Как быстро руль возвращается в центр после отпускания A/D. Важно для хвоста дрифта",
      detail: "В v2.3 нет порога выхода из дрифта — intensity_target падает плавно по мере возврата руля к центру через pow(|steer|, exp). Медленный возврат руля = плавный выход из дрифта.\n\nОриентиры:\n• 1.5: руль медленно возвращается, intensity плавно падает\n• 3.5: стандарт\n• 8+: руль мгновенно в центр, intensity сразу к 0" },
    { key: "THROTTLE_SLEW", min: 1, max: 20, step: 0.5, unit: "/s",
      short: "Как быстро газ раскручивается до полного при нажатии W. Меньше = мягче педаль",
      detail: "Делает газ плавным — как педаль, а не тумблер.\n\nОриентиры:\n• 2: ощущение педали, плавный набор\n• 5: средне\n• 10+: почти мгновенный газ (как кнопка)\n\nМаленькое значение добавляет реализма ускорению. Большое — аркадная отзывчивость." },
  ],
  "Рулёжка": [
    { key: "STEERING_SPEED", min: 0.5, max: 5, step: 0.1, unit: "rad/s",
      short: "Базовая сила руля. Главный регулятор отзывчивости поворотов",
      detail: "Влияет на то как быстро машина разворачивается.\n\nСлишком мало → машина лениво поворачивает, приходится заранее крутить руль.\nСлишком много → машина дёрганая, крутится волчком от лёгкого касания.\n\nСкорость поворота дополнительно меняется от скорости машины (см. STEER_LOW_MULT / STEER_HIGH_MULT) и от дрифта." },
    { key: "STEER_LOW_MULT", min: 0.5, max: 3, step: 0.05, unit: "x",
      deps: ["STEERING_SPEED", "STEER_HIGH_MULT"],
      short: "Насколько острее руль на малой скорости (для манёвров и парковки)",
      detail: "Обычно больше 1.0 — чтоб машина хорошо маневрировала на медленных скоростях.\n\nОриентиры:\n• 1.0: нет разницы с обычной\n• 1.4: заметно острее на парковке\n• 2.0: очень острый, машина резко крутится на месте\n\nЕсли на медленной скорости руль кажется ватным → увеличь." },
    { key: "STEER_HIGH_MULT", min: 0.1, max: 1.5, step: 0.05, unit: "x",
      deps: ["STEERING_SPEED", "STEER_LOW_MULT"],
      short: "Насколько руль 'успокаивается' на максимальной скорости. Меньше = шире повороты на скорости",
      detail: "Обычно меньше 1.0 — чтоб на максималке машина не крутилась волчком от лёгкого касания руля.\n\nОриентиры:\n• 0.5: очень плавные широкие повороты на скорости\n• 0.8: стандарт\n• 1.0: руль одинаково острый на любой скорости" },
    { key: "STEER_SPEED_THRESHOLD", min: 0.5, max: 10, step: 0.5, unit: "m/s",
      deps: ["STATIONARY_STEER_THRESHOLD"],
      short: "С какой скорости руль выходит на полную чувствительность",
      detail: "Ниже этой скорости руль плавно нарастает от минимальной до полной чувствительности. Выше — остаётся полным.\n\nПример: при 3 м/с — на 1.5 м/с руль работает на 50%, на 3+ — на 100%.\n\nМелкое значение = быстрое 'схватывание' руля при разгоне. Большое = руль раскачивается постепенно." },
    { key: "STATIONARY_STEER_THRESHOLD", min: 0.5, max: 5, step: 0.25, unit: "m/s",
      short: "На какой скорости включается хак 'поворот на месте'",
      detail: "Без этого хака машина вообще не крутится стоя (ведь скорость почти ноль). Ниже этой скорости активируется особый режим — см. STATIONARY_STEER_SCALE.\n\nЕсли машина начинает 'дёргаться' при плавном разгоне в повороте — возможно проблема в зоне этого порога." },
    { key: "STATIONARY_STEER_SCALE", min: 0.1, max: 1.0, step: 0.05, unit: "x",
      deps: ["STATIONARY_STEER_THRESHOLD"],
      short: "Насколько сильно машина крутится на месте. 0.4 = 40% полного поворота",
      detail: "Аркадный хак: карт должен 'отвечать' на руль даже когда стоит, иначе ощущение мертвой машины.\n\nОриентиры:\n• 0.2: еле крутится на месте, реалистично\n• 0.4: стандарт — визуально отзывчиво но не волчком\n• 0.8: крутится волчком стоя — совсем аркадно" },
    { key: "WHEEL_RADIUS", min: 0.05, max: 0.5, step: 0.01, unit: "m",
      short: "Радиус колеса — только для визуальной скорости вращения колёс",
      detail: "Чисто косметический параметр: меньше радиус = колёса визуально крутятся быстрее при той же скорости. На физику не влияет никак." },
  ],
  "Дрифт": [
    { key: "HIGH_GRIP", min: 5, max: 30, step: 0.5, unit: "",
      short: "Сцепление с дорогой ВНЕ дрифта (intensity=0). Больше = машина 'как по рельсам'",
      deps: ["LOW_GRIP"],
      detail: "В v2.2 grip вычисляется каждый кадр как lerp(HIGH_GRIP, LOW_GRIP, drift_intensity). Насколько хорошо машина держит дорогу в обычной езде (когда не дрифтуешь). Это гасит любое случайное боковое скольжение.\n\nОриентиры:\n• 8-10: машина слегка 'плавает' даже без дрифта\n• 15-20: стандарт — уверенно держит дорогу\n• 25+: 'как по рельсам', машина очень цепкая\n\nЕсли машина плохо держит дорогу в обычных поворотах → увеличь." },
    { key: "LOW_GRIP", min: 0.1, max: 3, step: 0.1, unit: "",
      short: "Сцепление в полном дрифте (intensity=1.0). Меньше = глубже и длиннее занос",
      deps: ["HIGH_GRIP"],
      detail: "В v2.2 grip = lerp(HIGH, LOW, intensity). При intensity=1.0 grip==LOW_GRIP. Чем меньше — тем машина сильнее уходит боком.\n\nОриентиры:\n• 0.2-0.4: глубокий занос, машина плывёт\n• 0.8-1.0: контролируемый дрифт, стандарт\n• 2.0+: дрифт почти не чувствуется\n\nРазница между HIGH_GRIP и LOW_GRIP определяет 'глубину' дрифта." },
    { key: "GRIP_LOSS_RATE", min: 0, max: 30, step: 0.5, unit: "/s",
      short: "[deprecated] Оставь 0. Legacy override v2.1 — grip через move_toward вместо intensity",
      deps: ["HIGH_GRIP", "LOW_GRIP"],
      detail: "[deprecated v2.1] В v2.2 grip автоматически вычисляется из drift_intensity. Этот параметр нужен только для отката к v2.1-поведению.\n\nОставь 0.0 — тогда работает новая intensity-based логика.\nНенулевое + GRIP_RECOVERY_RATE ненулевое → legacy override: grip падает через move_toward при входе в дрифт (binary _is_drifting)." },
    { key: "GRIP_RECOVERY_RATE", min: 0, max: 20, step: 0.5, unit: "/s",
      short: "[deprecated] Оставь 0. Legacy override v2.1 — grip через move_toward вместо intensity",
      deps: ["HIGH_GRIP", "LOW_GRIP"],
      detail: "[deprecated v2.1] В v2.2 grip автоматически восстанавливается через intensity decay. Этот параметр нужен только для отката к v2.1-поведению.\n\nОставь 0.0 — тогда работает новая intensity-based логика.\nНенулевое + GRIP_LOSS_RATE ненулевое → legacy override: grip восстанавливается через move_toward при выходе из дрифта." },
    { key: "DRIFT_MIN_SPEED", min: 1.0, max: 8.0, step: 0.5, unit: "m/s",
      short: "Hard gate: ниже этой скорости intensity гасится в 0 (нет дрифта)",
      detail: "v2.4: абсолютное значение (м/с, не ratio). Ниже drift_min_speed `_drift_intensity` принудительно decay к 0 независимо от slip_angle. Предотвращает phantom drift от velocity decompose noise при почти-остановке.\n\nОриентиры:\n• 1-2: дрифт почти всегда (на любой скорости)\n• 3: стандарт — дрифт от 3 м/с\n• 6-8: дрифт только на разгоне\n\nУвеличь если дрифт активируется когда машина почти стоит." },
    { key: "DRIFT_MAX_SLIP_ANGLE_DEG", min: 20, max: 55, step: 1, unit: "°",
      short: "Угол между velocity и носом при котором slip_ratio=1.0 (полный дрифт)",
      detail: "v2.4: slip_angle = atan2(|side_speed|, |fwd_speed|). При этом значении (в градусах) slip_ratio достигает 1.0 (полный intensity).\n\nОриентиры при fwd=20 м/с:\n• 20°: нужно side ≈ 7 м/с для полного — очень чувствительный дрифт\n• 35°: стандарт — нужно side ≈ 14 м/с\n• 50°: нужно side ≈ 24 м/с — только при сильном заносе\n\nЕсли дрифт слишком лёгкий → увеличь. Если даже сильный занос не даёт полный дрифт → уменьши." },
    { key: "SLIP_SMOOTHING", min: 3, max: 20, step: 0.5, unit: "/s",
      short: "Скорость экспоненциального lerp intensity→slip_ratio. Framerate-independent",
      detail: "v2.4: alpha = 1 - exp(-SLIP_SMOOTHING * delta), потом intensity = lerp(intensity, slip_ratio, alpha).\nHalf-life = ln(2)/rate.\n\nОриентиры:\n• 3-5: лаг ~200ms, дрифт 'нарастает' плавно (может казаться отставанием)\n• 8: стандарт, half-life ~87ms\n• 15+: почти мгновенный отклик, может дёргаться на bumps\n\nЕсли дрифт 'отстаёт' от физики → увеличь. Если дёргается → уменьши." },
    { key: "DRIFT_INTENT_MULTIPLIER", min: 0.0, max: 1.0, step: 0.05, unit: "",
      short: "Arcade aid: доп yaw при committed steer. 0.0 = чисто emergent",
      deps: ["DRIFT_INTENT_THRESHOLD"],
      detail: "v2.4: при |steer| > INTENT_THRESHOLD добавляется intent_aid = MULT * smoothstep(threshold, 1.0, |steer|) * sign(steer), эффективный steer = steer + intent_aid.\n\nПри threshold=0.7, mult=0.4, |steer|=1.0: effective = 1.4 (+40% yaw).\n\nОриентиры:\n• 0.0: чисто emergent — дрифт только из физики скольжения\n• 0.2-0.3: мягкий aid — помогает входить\n• 0.4: стандарт — arcade feel\n• 0.6+: steer почти доминирует (v2.3 feel)\n\nЕсли дрифт не ощущается контролируемым → увеличь." },
    { key: "DRIFT_INTENT_THRESHOLD", min: 0.5, max: 0.9, step: 0.05, unit: "",
      short: "|steer| с которого smoothstep начинает добавлять intent aid",
      deps: ["DRIFT_INTENT_MULTIPLIER"],
      detail: "v2.4: порог после которого intent_aid начинает расти. Smoothstep даёт C1-continuous переход — aid плавно нарастает от 0 до MULT на диапазоне [threshold..1.0].\n\nSmoothstep values (threshold=0.7):\n• |steer|=0.7 → aid=0.0\n• |steer|=0.8 → aid=0.26*MULT\n• |steer|=0.9 → aid=0.74*MULT\n• |steer|=1.0 → aid=1.0*MULT\n\nЕсли aid срабатывает при casual turn → увеличь порог. Если нужен aid при слабом повороте → уменьши." },
    { key: "GRIP_SLIP_EXPONENT", min: 1.0, max: 4.0, step: 0.1, unit: "",

const safeNum = (v, fb = 0) => (typeof v === "number" && isFinite(v)) ? v : fb;
const fmt = (v, d = 1) => isFinite(v) ? v.toFixed(d) : "—";

const FORMULAS = {
  "MAX_SPEED": p => `${fmt(safeNum(p.MAX_SPEED) * 3.6, 0)} km/h (референс)`,
  "ACCEL_FORCE": p => {
    const a = safeNum(p.ACCEL_FORCE);
    const d = safeNum(p.K_DRAG);
    const term = d > 0 ? Math.sqrt(a / d) : NaN;
    return `Терминалка ≈ ${fmt(term, 1)} m/s (${fmt(term * 3.6, 0)} km/h)`;
  },
  "K_DRAG": p => {
    const a = safeNum(p.ACCEL_FORCE);
    const d = safeNum(p.K_DRAG);
    const term = d > 0 ? Math.sqrt(a / d) : NaN;
    return `Терминалка ≈ ${fmt(term, 1)} m/s`;
  },
  "K_ROLLING": p => `Drag@5m/s: ${fmt(safeNum(p.K_ROLLING) * 5, 1)} m/s² │ @15m/s: ${fmt(safeNum(p.K_ROLLING) * 15, 1)}`,
  "BRAKE_FORCE": p => {
    const maxV = safeNum(p.MAX_SPEED);
    const total = safeNum(p.BRAKE_FORCE) + safeNum(p.K_ROLLING) * maxV + safeNum(p.K_DRAG) * maxV * maxV;
    return `Стоп с max (~${fmt(maxV, 0)} m/s): ~${fmt(maxV / total, 2)}s`;
  },
  "REVERSE_RATIO": p => {
    const term = safeNum(p.K_DRAG) > 0 ? Math.sqrt(safeNum(p.ACCEL_FORCE) * safeNum(p.REVERSE_RATIO) / safeNum(p.K_DRAG)) : NaN;
    return `Reverse top: ${fmt(term, 1)} m/s`;
  },
  "STEER_SLEW_IN": p => {
    const s = safeNum(p.STEER_SLEW_IN);
    return `Полный руль за ${fmt(s > 0 ? 1 / s : 0, 2)}s`;
  },
  "STEER_SLEW_OUT": p => {
    const s = safeNum(p.STEER_SLEW_OUT);
    return `Центр за ${fmt(s > 0 ? 1 / s : 0, 2)}s`;
  },
  "THROTTLE_SLEW": p => `Полный газ за ${fmt(safeNum(p.THROTTLE_SLEW) > 0 ? 1 / p.THROTTLE_SLEW : 0, 2)}s`,
  "STEERING_SPEED": p => `Тихо: ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STEER_LOW_MULT))} │ Макс: ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STEER_HIGH_MULT))} rad/s`,
  "STEER_LOW_MULT": p => `= ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STEER_LOW_MULT))} rad/s на v≈0`,
  "STEER_HIGH_MULT": p => `= ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STEER_HIGH_MULT))} rad/s на max`,
  "STEER_SPEED_THRESHOLD": p => `Полный руль от ${fmt(safeNum(p.STEER_SPEED_THRESHOLD))} m/s`,
  "STATIONARY_STEER_THRESHOLD": p => `Хак активен при v < ${fmt(safeNum(p.STATIONARY_STEER_THRESHOLD))} m/s`,
  "STATIONARY_STEER_SCALE": p => `Yaw стоя: ${fmt(safeNum(p.STEERING_SPEED) * safeNum(p.STATIONARY_STEER_SCALE))} rad/s (${fmt(safeNum(p.STATIONARY_STEER_SCALE) * 100, 0)}% полного)`,
  "WHEEL_RADIUS": p => {
    const r = safeNum(p.WHEEL_RADIUS);
    return r > 0 ? `${fmt(safeNum(p.MAX_SPEED) / r / (2 * Math.PI), 0)} об/с на макс` : "—";
  },
  "HIGH_GRIP": p => `За 0.1с гасит ${fmt((1 - Math.exp(-safeNum(p.HIGH_GRIP) * 0.1)) * 100, 0)}% бокового`,
  "LOW_GRIP": p => {
    const g = safeNum(p.LOW_GRIP);
    return `Half-life: ${fmt(g > 0 ? Math.LN2 / g : 0, 2)}s │ 1с: -${fmt((1 - Math.exp(-g)) * 100, 0)}%`;
  },
  "GRIP_LOSS_RATE": p => {
    const delta = safeNum(p.HIGH_GRIP) - safeNum(p.LOW_GRIP);
    const r = safeNum(p.GRIP_LOSS_RATE);
    return `HIGH→LOW: ${fmt(r > 0 ? delta / r : 0, 2)}s`;
  },
  "GRIP_RECOVERY_RATE": p => {
    const delta = safeNum(p.HIGH_GRIP) - safeNum(p.LOW_GRIP);
    const r = safeNum(p.GRIP_RECOVERY_RATE);
    return `LOW→HIGH: ${fmt(r > 0 ? delta / r : 0, 2)}s`;
  },
  "DRIFT_MIN_SPEED": p => `Hard gate: drift disabled при fwd_speed < ${fmt(safeNum(p.DRIFT_MIN_SPEED, 3.0))} m/s`,
  "DRIFT_MAX_SLIP_ANGLE_DEG": p => {
    const a = safeNum(p.DRIFT_MAX_SLIP_ANGLE_DEG, 35);
    const needed = Math.tan(a * Math.PI / 180) * 20;
    return `При fwd=20 м/с: side ≈ ${fmt(needed, 1)} m/s → slip_ratio=1.0`;
  },
  "SLIP_SMOOTHING": p => {
    const r = safeNum(p.SLIP_SMOOTHING, 8);
    return `Half-life: ${fmt(r > 0 ? Math.LN2 / r : 0, 3)}s │ 60fps alpha: ${fmt(1 - Math.exp(-r/60), 3)}`;
  },
  "DRIFT_INTENT_MULTIPLIER": p => {
    const m = safeNum(p.DRIFT_INTENT_MULTIPLIER, 0.4);
    return `При |steer|=1.0: effective steer = 1 + ${fmt(m, 2)} = ${fmt(1 + m, 2)}`;
  },
  "DRIFT_INTENT_THRESHOLD": p => {
    const t = safeNum(p.DRIFT_INTENT_THRESHOLD, 0.7);
    const m = safeNum(p.DRIFT_INTENT_MULTIPLIER, 0.4);
    const at80 = Math.max(0, Math.min(1, (0.8 - t) / (1 - t)));
    const smoothstep80 = at80 * at80 * (3 - 2 * at80);
    return `При |steer|=0.8 → aid=${fmt(smoothstep80 * m, 3)}`;
  },
  "GRIP_SLIP_EXPONENT": p => {
    const e = safeNum(p.GRIP_SLIP_EXPONENT, 2.0);
    const hi = safeNum(p.HIGH_GRIP, 29);
    const lo = safeNum(p.LOW_GRIP, 1);
    const grip50 = hi + (lo - hi) * Math.pow(0.5, e);
    const grip70 = hi + (lo - hi) * Math.pow(0.7, e);
    return `intensity=0.5 → grip=${fmt(grip50, 1)} │ 0.7 → ${fmt(grip70, 1)}`;
  },
  "DRIFT_YAW_MULTIPLIER": p => `При intensity=1.0: +${fmt((safeNum(p.DRIFT_YAW_MULTIPLIER) - 1) * 100, 0)}% поворота`,
  "GRIP_LOSS_RATE": p => `[deprecated] При 0.0 — intensity path active`,
  "GRIP_RECOVERY_RATE": p => `[deprecated] При 0.0 — intensity path active`,
  "DRIFT_ACTIVE_THRESHOLD": p => {
    const t = safeNum(p.DRIFT_ACTIVE_THRESHOLD, 0.55);
    return `VFX on при intensity > ${fmt(t + 0.02, 2)} │ off при < ${fmt(t - 0.02, 2)} (mini-hyst)`;
  },
  "DRIFT_DRAG_MULTIPLIER": p => {
    const a = safeNum(p.ACCEL_FORCE); const kd = safeNum(p.K_DRAG); const m = safeNum(p.DRIFT_DRAG_MULTIPLIER, 1);
    const vn = kd > 0 ? Math.sqrt(a / kd) : 0;
    const vd = (kd * m) > 0 ? Math.sqrt(a / (kd * m)) : 0;
    return `Terminal drift: ${fmt(vd)} m/s (${fmt(vn > 0 ? vd / vn * 100 : 0, 0)}% от нормального)`;
  },
  "CORNERING_DRAG_COEFF": p => {
    const c = safeNum(p.CORNERING_DRAG_COEFF, 0.3);
    const at5 = c * 5; const at10 = c * 10;
    return `side=5 м/с → -${fmt(at5, 1)} м/с²  |  side=10 м/с → -${fmt(at10, 1)} м/с²`;
  },
  "DRIFT_ROLLING_MULTIPLIER": p => {
    const kr = safeNum(p.K_ROLLING); const m = safeNum(p.DRIFT_ROLLING_MULTIPLIER, 1);
    return `Effective rolling в дрифте: ${fmt(kr * m, 2)} (×${fmt(m, 2)})`;
  },
  "VFX_SMOKE_THRESHOLD": p => `Дым от ${fmt(safeNum(p.VFX_SMOKE_THRESHOLD))} m/s бокового`,
  "VISUAL_DRIFT_MAX_DEG": p => `Наклон в дрифте: ±${fmt(safeNum(p.VISUAL_DRIFT_MAX_DEG), 0)}°`,
  "DEBUG_VECTORS": p => `${safeNum(p.DEBUG_VECTORS) > 0 ? "ВКЛ ✓" : "выкл"}`,
  "GRAVITY": p => `${fmt(safeNum(p.GRAVITY) / 9.8, 1)}× Земля │ 3м: ${fmt(Math.sqrt(6 / safeNum(p.GRAVITY, 1)), 2)}s`,
  "SLOPE_INFLUENCE": p => `30°: ±${fmt(0.5 * safeNum(p.SLOPE_INFLUENCE))} m/s²`,
  "ROCKET_SPEED": p => {
    const mx = safeNum(p.MAX_SPEED);
    return `${fmt(mx > 0 ? safeNum(p.ROCKET_SPEED) / mx : 0, 1)}× карта │ ${fmt(safeNum(p.ROCKET_SPEED) * 3.6, 0)} km/h`;
  },
  "ROCKET_LIFETIME": p => `Дальность: ${fmt(safeNum(p.ROCKET_SPEED) * safeNum(p.ROCKET_LIFETIME), 0)}м`,
  "DAMAGE": p => {
    const d = safeNum(p.DAMAGE);
    return d > 0 ? `${Math.ceil(100 / d)} попаданий = смерть` : "—";
  },
  "CAMERA_HEIGHT": p => {
    const d = safeNum(p.CAMERA_DISTANCE);
    return `Угол: ${d > 0 ? fmt(Math.atan(safeNum(p.CAMERA_HEIGHT) / d) * 180 / Math.PI, 0) : "—"}°`;
  },
  "FOV_SPEED_BOOST": p => `На макс: ${fmt(safeNum(p.FOV) + safeNum(p.FOV_SPEED_BOOST), 0)}°`,
};

// Whitelist of keys that tuner is allowed to write. Prevents zombie keys from
// pre-v2 params getting resurrected when the file is saved.
const ALLOWED_KEYS = new Set();
for (const group of Object.values(PARAMS)) {
  for (const p of group) ALLOWED_KEYS.add(p.key);
}

let currentData = {};
let originalData = {};
let saveTimeout = null;

async function loadParams() {
  try {
    const r = await fetch("/params");
    currentData = await r.json();
    originalData = JSON.parse(JSON.stringify(currentData));
    render();
    setStatus("Loaded", "");
  } catch(e) {
    setStatus("Error loading: " + e.message, "error");
  }
}

function setStatus(text, cls) {
  const el = document.getElementById("status");
  el.textContent = text;
  el.className = "status " + (cls || "");
}

function render() {
  const container = document.getElementById("groups");
  container.innerHTML = "";

  for (const [groupName, params] of Object.entries(PARAMS)) {
    const group = document.createElement("div");
    group.className = "group";
    group.innerHTML = `<h2>${groupName}</h2>`;

    for (const p of params) {
      const val = currentData[p.key] ?? 0;
      const changed = val !== originalData[p.key];
      const div = document.createElement("div");
      div.className = "param" + (changed ? " changed" : "");
      div.id = "param-" + p.key;

      const formula = FORMULAS[p.key] ? FORMULAS[p.key](currentData) : "";
      const hasDetail = p.detail && p.detail.length > 0;

      const depsHtml = (p.deps && p.deps.length) ?
        `<div class="dep-section">↔ ${p.deps.map(d => `<span class="dep-tag" onclick="scrollToParam('${d}')" title="Зависимый параметр">${d}</span>`).join(" ")}</div>` : "";
      // Build reverse deps display
      const affectedBy = [];
      for (const [gn, gp] of Object.entries(PARAMS)) {
        for (const op of gp) {
          if (op.deps && op.deps.includes(p.key)) affectedBy.push(op.key);
        }
      }
      const affectedHtml = affectedBy.length ?
        `<span class="dep-badge" title="Влияет на: ${affectedBy.join(', ')}">↑ ${affectedBy.length}</span>` : "";

      div.innerHTML = `
        <div class="param-row">
          <span class="param-name">${p.key}</span>${affectedHtml}
          <input type="range" class="param-slider" id="slider-${p.key}" min="${p.min}" max="${p.max}" step="${p.step}" value="${val}">
          <input type="number" class="param-num" id="num-${p.key}" min="${p.min}" max="${p.max}" step="${p.step}" value="${val}">
          <span class="param-unit">${p.unit}</span>
        </div>
        <div class="param-info">
          <span class="param-short">${p.short}</span>
          ${formula ? `<span class="param-formula">${formula}</span>` : ""}
          ${hasDetail ? `<span class="param-expand" onclick="this.parentElement.nextElementSibling.classList.toggle('open')">\u25BC</span>` : ""}
        </div>
        ${hasDetail ? `<div class="param-detail">${p.detail.replace(/\\n/g, '<br>')}</div>` : ""}
        ${depsHtml}
      `;
      group.appendChild(div);

      setTimeout(() => {
        const slider = document.getElementById("slider-" + p.key);
        const num = document.getElementById("num-" + p.key);
        if (!slider || !num) return;

        const update = (v) => {
          const val = parseFloat(v);
          if (isNaN(val)) return; // guard: empty field or invalid input
          currentData[p.key] = val;
          slider.value = val;
          num.value = val;
          const wrap = document.getElementById("param-" + p.key);
          if (val !== originalData[p.key]) wrap.classList.add("changed");
          else wrap.classList.remove("changed");
          updateFormulas();
          highlightDeps(p.key);
          autoSave();
        };
        slider.addEventListener("input", e => update(e.target.value));
        num.addEventListener("input", e => update(e.target.value));
      }, 0);
    }
    container.appendChild(group);
  }
}

function updateFormulas() {
  for (const [groupName, params] of Object.entries(PARAMS)) {
    for (const p of params) {
      const fn = FORMULAS[p.key];
      if (!fn) continue;
      const el = document.getElementById("param-" + p.key);
      if (!el) continue;
      const formulaSpan = el.querySelector(".param-formula");
      try {
        const text = fn(currentData);
        if (formulaSpan) formulaSpan.textContent = text;
      } catch(e) {}
    }
  }
}

function autoSave() {
  if (!document.getElementById("autosave").checked) return;
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(save, 300);
}

async function save() {
  clearTimeout(saveTimeout);
  try {
    const full = {};
    // Only write keys that are: (a) underscore comments/sections, or (b) in our allowed list.
    // Unknown keys get dropped — prevents pre-v2 zombies from being resurrected.
    for (const [k, v] of Object.entries(currentData)) {
      if (k.startsWith("_") || ALLOWED_KEYS.has(k)) full[k] = v;
    }
    for (const [k, v] of Object.entries(originalData)) {
      if (k.startsWith("_") && !(k in full)) full[k] = v;
    }

    const r = await fetch("/params", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(full, null, 2),
    });
    if (r.ok) {
      setStatus("Saved! Hot-reload ~0.5s", "saved");
      setTimeout(() => setStatus("", ""), 2000);
    } else {
      setStatus("Save error: " + r.status, "error");
    }
  } catch(e) {
    setStatus("Save error: " + e.message, "error");
  }
}

function scrollToParam(key) {
  const el = document.getElementById("param-" + key);
  if (!el) return;
  el.scrollIntoView({ behavior: "smooth", block: "center" });
  el.classList.add("dep-affected");
  setTimeout(() => el.classList.remove("dep-affected"), 2000);
}

// Highlight dependent params when a value changes
function highlightDeps(key) {
  // Find params that list this key in their deps
  for (const [gn, gp] of Object.entries(PARAMS)) {
    for (const p of gp) {
      if (p.deps && p.deps.includes(key)) {
        const el = document.getElementById("param-" + p.key);
        if (el) {
          el.classList.add("dep-affected");
          setTimeout(() => el.classList.remove("dep-affected"), 1500);
        }
      }
    }
  }
  // Also highlight params that this key depends on
  for (const [gn, gp] of Object.entries(PARAMS)) {
    for (const p of gp) {
      if (p.key === key && p.deps) {
        for (const d of p.deps) {
          const el = document.getElementById("param-" + d);
          if (el) {
            el.classList.add("dep-affected");
            setTimeout(() => el.classList.remove("dep-affected"), 1500);
          }
        }
      }
    }
  }
}

loadParams();
</script>
</body>
</html>
