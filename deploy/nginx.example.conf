# nginx configuration for Smash Karts Clone
# Replace <DOMAIN> with your domain (e.g. karts.example.com)
# Place this file at: /etc/nginx/sites-available/smash-karts
# Then: sudo ln -s /etc/nginx/sites-available/smash-karts /etc/nginx/sites-enabled/smash-karts

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name <DOMAIN>;

    # Allow certbot ACME challenges during initial cert issuance
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server block ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name <DOMAIN>;

    # TLS certificates (managed by certbot — paths filled automatically after: certbot --nginx -d <DOMAIN>)
    ssl_certificate     /etc/letsencrypt/live/<DOMAIN>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<DOMAIN>/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Static HTML5 build ────────────────────────────────────────────────────
    root /var/www/smash-karts;
    index index.html;

    location / {
        try_files $uri $uri/ =404;

        # REQUIRED for Godot 4 HTML5 threading (SharedArrayBuffer + Atomics).
        # Without these headers the game will NOT start in modern browsers.
        add_header Cross-Origin-Opener-Policy   "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp"  always;

        # Optional: disable caching for the HTML shell so players always get
        # the latest build; heavy assets (.wasm, .pck) can be cached.
        location ~* \.(html)$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Cross-Origin-Opener-Policy   "same-origin"   always;
            add_header Cross-Origin-Embedder-Policy "require-corp"  always;
        }
    }

    # ── WebSocket proxy to Godot dedicated server ─────────────────────────────
    # Godot server listens on plain ws:// on 127.0.0.1:4444 (no TLS internally).
    # nginx terminates TLS and upgrades the connection.
    #
    # The game client connects to: wss://<DOMAIN>/ws
    location /ws {
        proxy_pass http://127.0.0.1:4444;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client IP to Godot logs
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket connections alive for long sessions (24h max).
        # Godot's own ping/pong keeps the connection active.
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;
    }
}
